<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<meta name="description" content="Reserva Mallorca como un local. Experiencias, fiestas, playas escondidas y atardeceres. Sin intermediarios.">
<title>MallorcasLocal — Reserva Mallorca como un local</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--bg2:#111;--bg3:#191919;--card:#0e0e0e;--card2:#141414;--line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.09);--line3:rgba(255,255,255,.14);--text:#eee;--text2:rgba(255,255,255,.48);--text3:rgba(255,255,255,.24);--gold:#c9a96e;--gold2:#d9bc82;--golddim:rgba(201,169,110,.12);--goldglow:rgba(201,169,110,.28);--wa:#25d366;--danger:#ef4444;--success:#10b981;--ff:'DM Sans',sans-serif;--fs:'Playfair Display',serif;--ease:.25s cubic-bezier(.4,0,.2,1);--ease2:.4s cubic-bezier(.22,1,.36,1);--r:12px;--r2:16px;--r3:24px;--rmax:999px;--btn-text:#0a0a0a;--shadow-sm:0 2px 8px rgba(0,0,0,.2);--shadow-md:0 10px 32px rgba(0,0,0,.3);--shadow-lg:0 20px 60px rgba(0,0,0,.4);--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:var(--ff);cursor:pointer;border:none;background:none;color:var(--text)}
img{display:block;max-width:100%}
::selection{background:var(--gold);color:#000}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
button:focus{outline:none}button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.32;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}
body.lm{--bg:#f7f6f2;--bg2:#edece7;--bg3:#e2e0da;--card:#fff;--card2:#fafaf7;--line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.1);--line3:rgba(0,0,0,.16);--text:#1a1a1a;--text2:rgba(0,0,0,.52);--text3:rgba(0,0,0,.26);--gold:#9a7a3c;--gold2:#7d6030;--golddim:rgba(154,122,60,.1);--goldglow:rgba(154,122,60,.22);--btn-text:#fff}
body.lm::before{opacity:.08}
body.lm .topbar{background:rgba(247,246,242,.94)}
body.lm .hero-bg img{opacity:.55;filter:saturate(.85) brightness(1.05)}
body.lm .hero-bg::after{background:linear-gradient(to top,var(--bg) 0%,rgba(247,246,242,.5) 35%,rgba(247,246,242,.15) 65%,rgba(247,246,242,.4) 100%)}
body.lm .cat-nav{background:rgba(247,246,242,.95)}
body.lm .cat-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
body.lm .btn-gold,body.lm .v-wa,body.lm .f-submit,body.lm .jf-submit,body.lm .ib-submit,body.lm .ib-next,body.lm .cart-dock-btn{color:#fff}
body.lm .v-card{box-shadow:0 1px 4px rgba(0,0,0,.05)}
body.lm .p-logo{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}
body.lm .p-logo img{filter:none}
body.lm .feat-info h3,body.lm .feat-info .feat-loc,body.lm .feat-tag,body.lm .feat-price,body.lm .col-info h3,body.lm .col-info p,body.lm .col-eyebrow,body.lm .col-cta,body.lm .v-img-overlay p,body.lm .v-img-overlay strong{color:#fff}
body.lm .feat-tag{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.25)}
html[dir="rtl"] .topbar,html[dir="rtl"] .tb-r,html[dir="rtl"] .lang-grp{flex-direction:row-reverse}
html[dir="rtl"] .hero-content{text-align:right}
html[dir="rtl"] .hero-ctas,html[dir="rtl"] .v-top,html[dir="rtl"] .cat-inner,html[dir="rtl"] .trust{flex-direction:row-reverse}
html[dir="rtl"] .wa-fab{left:18px;right:auto}
html[dir="rtl"] .v-fav{left:8px;right:auto}
html[dir="rtl"] .v-badge{right:8px;left:auto}
html[dir="rtl"] .feat-price{left:12px;right:auto}
.topbar{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;background:rgba(5,5,5,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(14px,4vw,32px);transition:background var(--ease)}
.tb-logo{font-family:var(--fs);font-size:18px;font-weight:600;letter-spacing:-.02em;white-space:nowrap}
.tb-logo span{color:var(--gold);font-style:italic}
.tb-r{display:flex;align-items:center;gap:4px}
.lang-grp{display:flex;gap:2px;flex-wrap:nowrap}
.lb{padding:4px 7px;border-radius:6px;font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);transition:all var(--ease);min-width:26px}
.lb:hover{color:var(--text2);background:var(--line)}
.lb.on{color:var(--gold);background:var(--golddim)}
.tb-icon{width:32px;height:32px;border-radius:8px;margin-left:2px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;transition:all var(--ease);position:relative}
.tb-icon:hover{color:var(--text);background:var(--line)}
.tb-icon svg{width:15px;height:15px;fill:currentColor}
.tb-icon .badge{position:absolute;top:2px;right:2px;min-width:14px;height:14px;border-radius:7px;background:var(--gold);color:var(--btn-text);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}
@media(max-width:520px){.lb{padding:3px 5px;font-size:9px;min-width:22px}}
.hero{position:relative;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:76px clamp(16px,4vw,40px) clamp(40px,8vh,80px);overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.38;filter:saturate(.65)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(5,5,5,.55) 40%,rgba(5,5,5,.15) 70%,rgba(5,5,5,.45) 100%)}
.hero-content{position:relative;z-index:1;max-width:740px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:22px;padding:6px 14px;border-radius:var(--rmax);border:1px solid var(--line2);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:rgba(0,0,0,.15)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--golddim);animation:glow 2.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px var(--golddim)}50%{box-shadow:0 0 0 8px transparent}}
.hero h1{font-family:var(--fs);font-size:clamp(38px,6.8vw,78px);font-weight:500;letter-spacing:-.03em;line-height:1.02;margin-bottom:22px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-p{font-size:clamp(14px,1.55vw,16.5px);color:var(--text2);max-width:540px;margin-bottom:36px;line-height:1.65}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--rmax);background:var(--gold);color:var(--btn-text);font-weight:600;font-size:13px;letter-spacing:.02em;transition:all var(--ease);white-space:nowrap;border:none;cursor:pointer;font-family:var(--ff)}
.btn-gold:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 28px var(--goldglow)}
.btn-gold:active{transform:translateY(0)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--rmax);background:rgba(255,255,255,.03);color:var(--text);font-weight:600;font-size:13px;border:1px solid var(--line2);transition:all var(--ease);white-space:nowrap;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.btn-ghost:hover{border-color:var(--line3);background:rgba(255,255,255,.06);transform:translateY(-1px)}
.hero-scroll{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:6px;animation:bob 2s ease-in-out infinite;pointer-events:none}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
.hero-scroll::after{content:'';width:1px;height:20px;background:linear-gradient(to bottom,var(--text3),transparent)}
.trust{display:flex;justify-content:center;gap:clamp(20px,5vw,60px);padding:28px clamp(16px,4vw,40px);border-bottom:1px solid var(--line);background:linear-gradient(to bottom,transparent,rgba(255,255,255,.01))}
.trust-item{text-align:center}
.trust-item strong{display:block;font-family:var(--fs);font-size:clamp(24px,3vw,36px);font-weight:500;letter-spacing:-.02em;color:var(--gold);line-height:1}
.trust-item span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-top:6px;display:block}
.sec-title{max-width:1200px;margin:0 auto;padding:clamp(40px,5vh,72px) clamp(16px,4vw,40px) 22px}
.sec-title h2{font-family:var(--fs);font-size:clamp(26px,3.2vw,42px);font-weight:500;letter-spacing:-.02em;line-height:1.1}
.sec-title h2 em{font-style:italic;color:var(--gold)}
.sec-title p{font-size:13.5px;color:var(--text2);margin-top:8px;max-width:460px;line-height:1.55}
.featured{padding:0 0 16px}
.feat-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:0 clamp(16px,4vw,40px) 16px;scroll-snap-type:x mandatory;scroll-padding-left:clamp(16px,4vw,40px)}
.feat-scroll::-webkit-scrollbar{display:none}
.feat-card{flex:0 0 clamp(240px,32vw,320px);scroll-snap-align:start;border-radius:var(--r2);overflow:hidden;position:relative;aspect-ratio:3/4;cursor:pointer;display:block}
.feat-card img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease2)}
.feat-card:hover img{transform:scale(1.06)}
.feat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 50%,rgba(0,0,0,.05) 100%);pointer-events:none}
.feat-info{position:absolute;bottom:0;left:0;right:0;z-index:1;padding:18px}
.feat-tag{display:inline-block;padding:4px 10px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(201,169,110,.2);color:var(--gold);border:1px solid rgba(201,169,110,.28);margin-bottom:8px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.feat-info h3{font-family:var(--fs);font-size:20px;font-weight:500;margin-bottom:4px;color:#fff;letter-spacing:-.01em}
.feat-info .feat-loc{font-size:11px;color:rgba(255,255,255,.68);letter-spacing:.04em;font-weight:500}
.feat-price{position:absolute;top:12px;right:12px;z-index:1;padding:5px 11px;border-radius:var(--rmax);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);font-size:11.5px;font-weight:700;color:var(--gold)}
.cat-nav{position:sticky;top:56px;z-index:800;background:rgba(5,5,5,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--line);padding:10px clamp(16px,4vw,40px);transition:background var(--ease)}
.cat-inner{display:flex;gap:6px;max-width:1200px;margin:0 auto;overflow-x:auto;scrollbar-width:none;align-items:center}
.cat-inner::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 15px;border-radius:var(--rmax);font-size:11.5px;font-weight:600;white-space:nowrap;color:var(--text2);border:1px solid transparent;transition:all var(--ease);display:inline-flex;align-items:center;gap:5px}
.cat-btn:hover{color:var(--text);background:var(--line)}
.cat-btn.on{color:var(--btn-text);background:var(--gold);border-color:var(--gold)}
.cat-btn .cat-count{font-size:9.5px;opacity:.65;font-weight:500}
.search-bar{max-width:1200px;margin:12px auto 0;padding:0 clamp(16px,4vw,40px);display:none}
.search-bar.show{display:block}
.search-input-wrap{position:relative;display:flex;align-items:center}
.search-input{width:100%;padding:11px 40px 11px 40px;border-radius:var(--r);background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--text);font-family:var(--ff);font-size:13.5px;outline:none;transition:all var(--ease)}
.search-input:focus{border-color:var(--gold);background:rgba(255,255,255,.07)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
html[dir="rtl"] .search-icon{left:auto;right:13px}
html[dir="rtl"] .search-input{padding:11px 40px 11px 40px}
html[dir="rtl"] .search-clear{right:auto;left:8px}
.search-icon svg{width:15px;height:15px;fill:currentColor}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--line);display:none;align-items:center;justify-content:center;color:var(--text2);font-size:12px;cursor:pointer}
.search-clear.show{display:flex}
.search-clear:hover{background:var(--line3);color:var(--text)}
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.grid-meta{display:flex;justify-content:space-between;align-items:center;padding:14px 0 14px;font-size:12px;color:var(--text2);flex-wrap:wrap;gap:8px}
.grid-count em{color:var(--gold);font-style:normal;font-weight:700}
.grid-sort{display:flex;gap:4px;font-size:11px}
.sort-btn{padding:5px 11px;border-radius:var(--rmax);color:var(--text2);transition:all var(--ease);font-weight:500;cursor:pointer}
.sort-btn.on{color:var(--gold);background:var(--golddim)}
.sort-btn:hover{color:var(--text)}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
@media(max-width:640px){.venue-grid{grid-template-columns:1fr 1fr;gap:8px}}
@media(max-width:400px){.venue-grid{grid-template-columns:1fr}}
.v-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:all var(--ease);position:relative;display:flex;flex-direction:column}
.v-card:hover{border-color:var(--line3);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.v-img{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--bg2)}
.v-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease2)}
.v-card:hover .v-img img{transform:scale(1.05)}
.v-img-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.72) 45%,rgba(0,0,0,.35) 100%);opacity:0;transition:opacity .35s var(--ease2);display:flex;align-items:flex-end;padding:14px;pointer-events:none}
.v-card:hover .v-img-overlay,.v-card:focus-within .v-img-overlay{opacity:1}
.v-img-overlay div{width:100%}
.v-img-overlay strong{color:var(--gold);font-weight:700;display:block;margin-bottom:6px;font-size:10px;text-transform:uppercase;letter-spacing:.1em}
.v-img-overlay p{font-size:12px;color:rgba(255,255,255,.92);line-height:1.55;font-weight:400}
.v-badge{position:absolute;top:8px;left:8px;padding:3.5px 9px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:3}
.b-open{background:rgba(201,169,110,.2);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.b-season{background:rgba(255,255,255,.1);color:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.12)}
.b-premium{background:rgba(201,169,110,.35);color:#fff;border:1px solid rgba(201,169,110,.45)}
.v-fav{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--ease);z-index:4;color:rgba(255,255,255,.75)}
.v-fav:hover{background:rgba(0,0,0,.6);transform:scale(1.1)}
.v-fav.on{color:#ff5c7a;background:rgba(255,92,122,.15);border-color:rgba(255,92,122,.3)}
.v-fav svg{width:14px;height:14px;fill:currentColor;transition:transform var(--ease)}
.v-fav.on svg{transform:scale(1.15)}
.v-body{padding:11px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1}
.v-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.v-top h3{font-size:13px;font-weight:700;letter-spacing:-.01em;flex:1;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.v-pr{font-size:10.5px;font-weight:700;color:var(--gold);white-space:nowrap;padding-top:1px}
.v-loc{font-size:10px;color:var(--text3);letter-spacing:.03em;font-weight:500;display:flex;align-items:center;gap:3px}
.v-loc::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--text3)}
.v-tags{display:flex;flex-wrap:wrap;gap:3px}
.v-tag{font-size:9px;color:var(--text2);padding:2.5px 6px;border-radius:var(--rmax);background:rgba(255,255,255,.04);border:1px solid var(--line);letter-spacing:.02em}
.v-tag.info{background:rgba(201,169,110,.08);color:var(--gold);border-color:rgba(201,169,110,.2);font-weight:600}
.v-acts{display:flex;gap:5px;margin-top:auto;padding-top:6px}
.v-wa,.v-add,.v-info{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:9px;font-size:11px;font-weight:700;transition:all var(--ease);letter-spacing:.02em;border:none;cursor:pointer;font-family:var(--ff)}
.v-wa{flex:1;background:var(--gold);color:var(--btn-text)}
.v-wa:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 14px var(--goldglow)}
.v-wa svg{width:12px;height:12px;fill:currentColor}
.v-add{flex:1;background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line2)}
.v-add:hover{background:rgba(255,255,255,.08);border-color:var(--line3)}
.v-add.added{background:var(--golddim);color:var(--gold);border-color:rgba(201,169,110,.35)}
.v-add svg{width:13px;height:13px;fill:currentColor}
.v-map{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--ease);flex-shrink:0;color:var(--text2)}
.v-map:hover{background:rgba(255,255,255,.08);color:var(--text)}
.v-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text2)}
.v-empty h4{font-family:var(--fs);font-size:22px;color:var(--text);margin-bottom:8px;font-weight:500}
.v-empty p{font-size:13px;margin-bottom:16px}
.v-empty button{padding:10px 22px;border-radius:var(--rmax);background:var(--golddim);color:var(--gold);font-weight:600;font-size:12px;border:1px solid rgba(201,169,110,.3);transition:all var(--ease);cursor:pointer;font-family:var(--ff)}
.v-empty button:hover{background:rgba(201,169,110,.2)}
.collections-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.collection-card{position:relative;border-radius:var(--r2);overflow:hidden;aspect-ratio:3/4;cursor:pointer;transition:all var(--ease);display:block}
.collection-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.collection-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease2)}

/* ============ HELPERS ============ */
function t(k){return (L[k]&&(L[k][lang]||L[k].en))||k}
function loc(v){return (v&&typeof v==='object')?(v[lang]||v.en||v.es||''):(v||'')}
function parsePrice(v){return v._pr||0}
function fmtDate(iso){if(!iso)return '';try{const d=new Date(iso+'T00:00');return d.toLocaleDateString(lang==='ar'?'ar-EG':lang,{day:'numeric',month:'short',year:'numeric'})}catch(e){return iso}}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function waLink(v){
  const templ={
    es:`Hola! Me interesa ${loc(v.name)} (${loc(v.loc)}). Me podéis dar info y disponibilidad?`,
    en:`Hi! I'm interested in ${loc(v.name)} (${loc(v.loc)}). Can you send info and availability?`,
    de:`Hallo! Ich interessiere mich für ${loc(v.name)} (${loc(v.loc)}). Infos und Verfügbarkeit?`,
    fr:`Bonjour! Je suis intéressé par ${loc(v.name)} (${loc(v.loc)}). Infos et disponibilité ?`,
    it:`Ciao! Sono interessato a ${loc(v.name)} (${loc(v.loc)}). Info e disponibilità?`,
    ar:`مرحبا! أريد معلومات عن ${loc(v.name)} (${loc(v.loc)}) والتوفر.`,
    ru:`Привет! Интересует ${loc(v.name)} (${loc(v.loc)}). Инфо и доступность?`
  };
  return `https://wa.me/${WA}?text=${encodeURIComponent(templ[lang]||templ.en)}`;
}

/* ============ TOAST ============ */
function toast(msg,type){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  wrap.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400)},2400);
}

      const hay=[loc(v.name),loc(v.loc),loc(v.desc),...(loc(v.tags)||[])].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if(sort==='price-asc')list.sort((a,b)=>(a._pr||0)-(b._pr||0));
  else if(sort==='price-desc')list.sort((a,b)=>(b._pr||0)-(a._pr||0));

    }
    const addBtn=`<button class="v-add ${inCart?'added':''}" type="button" onclick="toggleCart('${v.id}',event)" aria-label="${t(inCart?'added':'add')}"><svg viewBox="0 0 24 24">${inCart?'<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>':'<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/>'}</svg>${t(inCart?'added':'add')}</button>`;

function setCat(c){
  cat=c;showFavsOnly=false;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===c));
  document.getElementById('favBtn').classList.remove('on');

function resetFilters(){
  cat='all';query='';showFavsOnly=false;
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat==='all'));
  renderVenues();

function toggleFav(id,e){
  e&&e.stopPropagation();e&&e.preventDefault();
  const i=favs.indexOf(id);
  if(i>=0){favs.splice(i,1);toast(t('toast_fav_off'))}
  else{favs.push(id);toast(t('toast_fav_on'),'success')}
  STORE.set('favs',favs);
  updateFavBadge();
  renderVenues();
}

function updateFavBadge(){
  const b=document.getElementById('favBadge');
  if(favs.length){b.textContent=favs.length;b.style.display='flex'}
  else b.style.display='none';
}

function toggleCart(id,e){
  e&&e.stopPropagation();e&&e.preventDefault();
  const i=cart.indexOf(id);
  if(i>=0){cart.splice(i,1);toast(t('toast_removed'))}
  else{cart.push(id);toast(t('toast_added'),'success')}
  STORE.set('cart',cart);
  renderCartDock();
  renderVenues();
}

function renderCartDock(){
  const dock=document.getElementById('cartDock');
  const count=cart.length;
  document.getElementById('cartCount').textContent=count;
  if(count>0){
    const total=cart.map(id=>V.find(v=>v.id===id)).filter(Boolean).reduce((s,v)=>s+(v._pr||0),0);
    document.getElementById('cartTotalDock').textContent=total>0?total+' €':t('qf_tbc');
    dock.classList.add('show');
  } else {
    dock.classList.remove('show');
  }
}

/* ============ SEARCH ============ */
let searchDebounce;
function initSearch(){
  const input=document.getElementById('searchInput');
  const clear=document.getElementById('searchClear');
  const btn=document.getElementById('searchBtn');
  const bar=document.getElementById('searchBar');
  input.placeholder=t('search_ph');
  btn.addEventListener('click',()=>{
    bar.classList.toggle('show');
    if(bar.classList.contains('show'))setTimeout(()=>input.focus(),100);
  });
  input.addEventListener('input',e=>{
    const v=e.target.value;
    clear.classList.toggle('show',v.length>0);
    clearTimeout(searchDebounce);
    searchDebounce=setTimeout(()=>{query=v;renderVenues()},180);
  });
  clear.addEventListener('click',()=>{input.value='';query='';clear.classList.remove('show');renderVenues();input.focus()});
}

/* ============ MODALS ============ */
function openModal(id){
  document.getElementById(id).classList.add('show');
  document.body.style.overflow='hidden';
  const m=document.querySelector('#'+id+' .modal');
  const f=m.querySelector('input,textarea,select,button:not(.mx)');
  if(f)setTimeout(()=>f.focus(),200);
}
function closeModal(id){
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('click',e=>{
  if(e.target.classList&&e.target.classList.contains('modal-bg'))closeModal(e.target.id);
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-bg.show').forEach(m=>closeModal(m.id));
  }
});

function renderIbVibes(){

  document.querySelectorAll('#ibVibeChips .ib-chip').forEach(c=>c.addEventListener('click',()=>{
    const id=c.dataset.v;
    const i=ibState.vibes.indexOf(id);

function renderIbDurs(){

  document.querySelectorAll('#ibDurChips .ib-chip').forEach(c=>c.addEventListener('click',()=>{ibState.dur=c.dataset.d;renderIbDurs()}));
}
function renderIbBudgets(){
  document.getElementById('ibBudgetChips').innerHTML=budgets.map(b=>`<button type="button" class="ib-chip${ibState.budget===b.id?' sel':''}" data-b="${b.id}"><span class="ib-chip-lb">${t('bud_'+b.id)}</span></button>`).join('');
  document.querySelectorAll('#ibBudgetChips .ib-chip').forEach(c=>c.addEventListener('click',()=>{ibState.budget=c.dataset.b;renderIbBudgets()}));
}
function renderIbPaxs(){
  document.getElementById('ibPaxChips').innerHTML=paxOpts.map(p=>`<button type="button" class="ib-chip${ibState.pax===p?' sel':''}" data-p="${p}"><span class="ib-chip-lb">${t('pax_'+p)}</span></button>`).join('');
  document.querySelectorAll('#ibPaxChips .ib-chip').forEach(c=>c.addEventListener('click',()=>{ibState.pax=c.dataset.p;renderIbPaxs()}));

function openItinerary(goToReview){
  const di=document.getElementById('ibDate');di.min=new Date().toISOString().split('T')[0];
  renderIbAll();
  if(goToReview&&cart.length>0){
    ibState.plan=cart.slice();
    ibGo(2);
  } else {
    ibGo(0);
  }
  openModal('ibModal');
}

function ibGo(step){
  ibState.step=step;
  for(let i=0;i<4;i++){
    const s=document.getElementById('ibStep'+i);
    s.classList.toggle('cur',i===step);
    s.classList.toggle('done',i<step);
  }
  for(let i=0;i<4;i++){
    const st=document.getElementById('ibStage'+i);
    st.classList.toggle('cur',i===step);
  }
  if(step===2)ibGenerate();
  if(step===3)updateIbFinalTotal();
}

document.getElementById('ibNext0').addEventListener('click',()=>{
  if(ibState.vibes.length===0){toast(t('ib_empty'),'err');return}
  ibGo(1);
});

function ibGenerate(){
  // if user manually picked cart items and entered from dock, just show them
  if(ibState.plan.length===0){
    // Generate from vibes/budget
    const chosenCats=new Set();
    ibState.vibes.forEach(vid=>{
      const vibe=vibes.find(v=>v.id===vid);
      if(vibe)vibe.cats.forEach(c=>chosenCats.add(c));
    });
    const budgetMax=budgets.find(b=>b.id===ibState.budget).max;
    let pool=V.filter(v=>chosenCats.has(v.cat)&&(v._pr||0)<=budgetMax);
    // Prioritize: featured, then paid activities, then free
    pool.sort((a,b)=>((b.feat?1:0)-(a.feat?1:0))||((b.paid?1:0)-(a.paid?1:0))||(b._pr-a._pr));
    const maxPicks=ibState.dur==='halfday'?2:ibState.dur==='fullday'?4:8;
    // Ensure variety across categories
    const picks=[];const seen=new Set();
    for(const v of pool){if(picks.length>=maxPicks)break;if(!seen.has(v.cat)||picks.length>=chosenCats.size){picks.push(v);seen.add(v.cat)}}
    if(picks.length<maxPicks){for(const v of pool){if(picks.length>=maxPicks)break;if(!picks.includes(v))picks.push(v)}}
    ibState.plan=picks.map(v=>v.id);
  }
  renderIbResult();
}

function renderIbResult(){
  const el=document.getElementById('ibResult');
  if(ibState.plan.length===0){
    el.innerHTML=`<div class="ib-empty-msg">${t('ib_empty')}</div>`;
    return;
  }
  const items=ibState.plan.map(id=>V.find(v=>v.id===id)).filter(Boolean);
  const total=items.reduce((s,v)=>s+(v._pr||0),0);
  el.innerHTML=`<div class="ib-result-title">${t('ib_your_plan')}</div>${items.map(v=>`
    <div class="ib-pick"><div class="ib-pick-img"><img src="${v.img}" alt="${esc(loc(v.name))}"></div>
      <div class="ib-pick-info"><div class="ib-pick-name">${esc(loc(v.name))}</div><div class="ib-pick-meta">${esc(loc(v.loc))}</div></div>
      <span class="ib-pick-pr">${esc(loc(v.price))}</span>
      <button type="button" class="ib-pick-rm" onclick="ibRemove('${v.id}')" aria-label="Remove">✕</button>
    </div>`).join('')}<div class="ib-total"><span>${t('qf_total')}</span><span>${total>0?total+' €':t('qf_tbc')}</span></div>`;
}

function ibRemove(id){
  ibState.plan=ibState.plan.filter(x=>x!==id);
  const ci=cart.indexOf(id);if(ci>=0){cart.splice(ci,1);STORE.set('cart',cart);renderCartDock();renderVenues()}
  renderIbResult();
}

function updateIbFinalTotal(){
  const items=ibState.plan.map(id=>V.find(v=>v.id===id)).filter(Boolean);
  const total=items.reduce((s,v)=>s+(v._pr||0),0);
  document.getElementById('ibFinalTotal').textContent=total>0?total+' €':t('qf_tbc');
}

/* ============ REVEAL ANIMATIONS ============ */
function initReveals(){
  if(!('IntersectionObserver' in window))return;
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}});
  },{threshold:0.06,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));
  // Watch for dynamically added .rv elements
  const mo=new MutationObserver(muts=>{
    muts.forEach(m=>m.addedNodes.forEach(n=>{
      if(n.nodeType===1){if(n.classList&&n.classList.contains('rv'))io.observe(n);n.querySelectorAll&&n.querySelectorAll('.rv').forEach(el=>io.observe(el))}
    }));
  });
  mo.observe(document.body,{childList:true,subtree:true});
}
