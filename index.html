<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MallorcasLocal — Reserva Mallorca como un local</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;--bg2:#111;--bg3:#191919;--card:#0e0e0e;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.09);--line3:rgba(255,255,255,.14);
  --text:#eee;--text2:rgba(255,255,255,.45);--text3:rgba(255,255,255,.2);
  --gold:#c9a96e;--golddim:rgba(201,169,110,.12);--goldglow:rgba(201,169,110,.25);
  --wa:#25d366;--ff:'DM Sans',sans-serif;--fs:'Playfair Display',serif;
  --ease:.25s cubic-bezier(.4,0,.2,1);--r:12px;--r2:16px;--r3:24px;--rmax:999px;--btn-text:#0a0a0a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--ff);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}button{font-family:var(--ff);cursor:pointer;border:none;background:none;color:var(--text)}img{display:block;max-width:100%}
::selection{background:var(--gold);color:#000}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.35;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

/* === LIGHT MODE === */
body.lm{--bg:#f7f6f2;--bg2:#edece7;--bg3:#e2e0da;--card:#fff;--line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.1);--line3:rgba(0,0,0,.16);--text:#1a1a1a;--text2:rgba(0,0,0,.5);--text3:rgba(0,0,0,.22);--gold:#9a7a3c;--golddim:rgba(154,122,60,.1);--goldglow:rgba(154,122,60,.18);--btn-text:#fff}
body.lm::before{opacity:.1}body.lm .topbar{background:rgba(247,246,242,.94)}
body.lm .hero-bg img{opacity:.55;filter:saturate(.8) brightness(1.05)}
body.lm .hero-bg::after{background:linear-gradient(to top,var(--bg) 0%,rgba(247,246,242,.5) 35%,rgba(247,246,242,.15) 65%,rgba(247,246,242,.4) 100%)}
body.lm .cat-nav{background:rgba(247,246,242,.95)}body.lm .cat-btn{color:var(--text2)}body.lm .cat-btn:hover{background:rgba(0,0,0,.04);color:var(--text)}body.lm .cat-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
body.lm .btn-gold,body.lm .v-wa,body.lm .qf-submit,body.lm .f-submit,body.lm .jf-submit{color:#fff}
body.lm .v-card{box-shadow:0 1px 4px rgba(0,0,0,.04)}body.lm .p-logo{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}body.lm .p-logo img{filter:none}
body.lm .feat-info h3,body.lm .feat-info p{color:#fff}body.lm .feat-tag{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.2);color:#fff}body.lm .feat-price{color:#fff}
body.lm .col-info h3,body.lm .col-info p,body.lm .col-eyebrow,body.lm .col-cta{color:#fff}

/* === RTL === */
html[dir="rtl"] .topbar{flex-direction:row-reverse}html[dir="rtl"] .tb-r{flex-direction:row-reverse}html[dir="rtl"] .lang-grp{flex-direction:row-reverse}
html[dir="rtl"] .hero-content{text-align:right}html[dir="rtl"] .hero-ctas{justify-content:flex-end}
html[dir="rtl"] .fi-row{direction:rtl}html[dir="rtl"] .v-top{flex-direction:row-reverse}
html[dir="rtl"] .cat-inner{flex-direction:row-reverse}html[dir="rtl"] .trust{flex-direction:row-reverse}

/* === TOPBAR === */
.topbar{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;background:rgba(5,5,5,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,32px);transition:all var(--ease)}
.tb-logo{font-family:var(--fs);font-size:18px;font-weight:600;letter-spacing:-.02em}.tb-logo span{color:var(--gold);font-style:italic}
.tb-r{display:flex;align-items:center;gap:4px}.lang-grp{display:flex;gap:2px;flex-wrap:wrap}
.lb{padding:4px 7px;border-radius:5px;font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);transition:all var(--ease)}.lb:hover{color:var(--text2);background:var(--line)}.lb.on{color:var(--gold);background:var(--golddim)}
.tb-theme{width:30px;height:30px;border-radius:7px;margin-left:2px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px;transition:all var(--ease)}.tb-theme:hover{color:var(--text);background:var(--line)}

/* === HERO === */
.hero{position:relative;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(16px,4vw,40px) clamp(40px,8vh,80px);overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.35;filter:saturate(.6)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(5,5,5,.6) 40%,rgba(5,5,5,.2) 70%,rgba(5,5,5,.5) 100%)}
.hero-content{position:relative;z-index:1;max-width:720px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;padding:6px 14px;border-radius:var(--rmax);border:1px solid var(--line2);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--golddim);animation:glow 2.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px var(--golddim)}50%{box-shadow:0 0 0 8px transparent}}
.hero h1{font-family:var(--fs);font-size:clamp(36px,6.5vw,74px);font-weight:500;letter-spacing:-.03em;line-height:1.02;margin-bottom:20px}.hero h1 em{font-style:italic;color:var(--gold)}
.hero-p{font-size:clamp(14px,1.5vw,16px);color:var(--text2);max-width:520px;margin-bottom:32px;line-height:1.65}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:var(--rmax);background:var(--gold);color:var(--btn-text);font-weight:600;font-size:13px;letter-spacing:.02em;transition:all var(--ease)}.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px var(--goldglow)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:var(--rmax);background:transparent;color:var(--text);font-weight:600;font-size:13px;border:1px solid var(--line2);transition:all var(--ease)}.btn-ghost:hover{border-color:var(--line3);background:rgba(255,255,255,.04)}
.hero-scroll{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:6px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(4px)}}
.hero-scroll::after{content:'';width:1px;height:18px;background:linear-gradient(to bottom,var(--text3),transparent)}

/* === TRUST === */
.trust{display:flex;justify-content:center;gap:clamp(20px,5vw,56px);padding:26px clamp(16px,4vw,40px);border-bottom:1px solid var(--line)}
.trust-item{text-align:center}.trust-item strong{display:block;font-family:var(--fs);font-size:clamp(22px,2.8vw,34px);font-weight:500;letter-spacing:-.02em;color:var(--gold)}.trust-item span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-weight:500}

/* === SECTION TITLE === */
.sec-title{max-width:1200px;margin:0 auto;padding:clamp(36px,5vh,64px) clamp(16px,4vw,40px) 20px}
.sec-title h2{font-family:var(--fs);font-size:clamp(24px,3vw,38px);font-weight:500;letter-spacing:-.02em}.sec-title h2 em{font-style:italic;color:var(--gold)}
.sec-title p{font-size:13.5px;color:var(--text2);margin-top:6px;max-width:440px}

/* === FEATURED === */
.featured{padding:0 0 16px}.feat-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:0 clamp(16px,4vw,40px) 16px;scroll-snap-type:x mandatory}.feat-scroll::-webkit-scrollbar{display:none}
.feat-card{flex:0 0 clamp(240px,32vw,320px);scroll-snap-align:start;border-radius:var(--r2);overflow:hidden;position:relative;aspect-ratio:3/4;cursor:pointer}
.feat-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}.feat-card:hover img{transform:scale(1.05)}
.feat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.15) 50%,transparent 100%)}
.feat-info{position:absolute;bottom:0;left:0;right:0;z-index:1;padding:16px}
.feat-tag{display:inline-block;padding:3px 9px;border-radius:var(--rmax);font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--golddim);color:var(--gold);border:1px solid rgba(201,169,110,.2);margin-bottom:6px}
.feat-info h3{font-family:var(--fs);font-size:18px;font-weight:500;margin-bottom:3px;color:#fff}
.feat-info p{font-size:11px;color:rgba(255,255,255,.6);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feat-price{position:absolute;top:12px;right:12px;z-index:1;padding:4px 10px;border-radius:var(--rmax);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);font-size:11px;font-weight:700;color:var(--gold)}

/* === CATEGORY NAV === */
.cat-nav{position:sticky;top:56px;z-index:800;background:rgba(5,5,5,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:10px clamp(16px,4vw,40px);transition:all var(--ease)}
.cat-inner{display:flex;gap:5px;max-width:1200px;margin:0 auto;overflow-x:auto;scrollbar-width:none}.cat-inner::-webkit-scrollbar{display:none}
.cat-btn{padding:7px 14px;border-radius:var(--rmax);font-size:11.5px;font-weight:600;white-space:nowrap;color:var(--text2);border:1px solid transparent;transition:all var(--ease)}.cat-btn:hover{color:var(--text);background:var(--line)}.cat-btn.on{color:var(--btn-text);background:var(--gold);border-color:var(--gold)}

/* === VENUE GRID === */
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
@media(max-width:640px){.venue-grid{grid-template-columns:1fr 1fr;gap:8px}}@media(max-width:400px){.venue-grid{grid-template-columns:1fr}}
.v-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:all var(--ease)}.v-card:hover{border-color:var(--line3);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.25)}
.v-img{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--bg2)}.v-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}.v-card:hover .v-img img{transform:scale(1.04)}
.v-badge{position:absolute;top:7px;left:7px;padding:3px 8px;border-radius:var(--rmax);font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;backdrop-filter:blur(8px)}
.b-open{background:rgba(201,169,110,.18);color:var(--gold);border:1px solid rgba(201,169,110,.25)}.b-season{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}.b-premium{background:rgba(201,169,110,.3);color:#fff;border:1px solid rgba(201,169,110,.4)}
.v-body{padding:10px 12px 12px}.v-top{display:flex;align-items:center;justify-content:space-between;gap:5px;margin-bottom:5px}.v-top h3{font-size:12.5px;font-weight:700;letter-spacing:-.01em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.v-pr{font-size:10.5px;font-weight:700;color:var(--gold);white-space:nowrap}
.v-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}.v-tag{font-size:9px;color:var(--text2);padding:2px 5px;border-radius:var(--rmax);background:rgba(255,255,255,.04);border:1px solid var(--line)}
.v-desc{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-acts{display:flex;gap:5px}
.v-wa{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;border-radius:9px;background:var(--gold);color:var(--btn-text);font-size:11px;font-weight:700;transition:all var(--ease)}.v-wa:hover{filter:brightness(1.1);transform:translateY(-1px)}
.v-map{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--ease);flex-shrink:0}.v-map:hover{background:rgba(255,255,255,.08)}

/* === COLLECTIONS === */
.collections-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.collection-card{position:relative;border-radius:var(--r2);overflow:hidden;aspect-ratio:3/4;cursor:pointer;transition:all var(--ease)}.collection-card:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.25)}
.collection-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}.collection-card:hover img{transform:scale(1.04)}
.col-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.05) 60%,transparent 100%);z-index:1}
.col-info{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:16px}
.col-eyebrow{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.col-info h3{font-family:var(--fs);font-size:18px;font-weight:500;color:#fff;margin-bottom:3px}
.col-info p{font-size:11px;color:rgba(255,255,255,.55);line-height:1.35}
.col-cta{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:10.5px;font-weight:600;color:var(--gold);letter-spacing:.02em;transition:gap var(--ease)}.collection-card:hover .col-cta{gap:8px}

/* === PRICING === */
.pricing-section{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.p-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;transition:all var(--ease)}.p-card:hover{border-color:rgba(201,169,110,.2)}
.p-card h4{font-family:var(--fs);font-size:17px;font-weight:500;margin-bottom:3px}.p-card .p-sub{font-size:11.5px;color:var(--text2);margin-bottom:12px}
.p-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px}.p-row:last-child{border:none}.p-row span:last-child{font-weight:700;color:var(--gold)}
.p-note{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.45}

/* === PARTNERS === */
.partners{padding:40px clamp(16px,4vw,40px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.partners h3{text-align:center;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:20px}
.partner-row{display:flex;justify-content:center;flex-wrap:wrap;gap:18px}
.p-logo{width:82px;height:82px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all var(--ease)}.p-logo:hover{border-color:rgba(201,169,110,.3);transform:scale(1.08)}
.p-logo img{width:54px;height:54px;object-fit:contain;filter:brightness(1.5) contrast(1.1)}.p-logo:hover img{filter:brightness(1.8)}

/* === QUICK FORM === */
.qf-section{max-width:600px;margin:0 auto;padding:clamp(36px,5vh,64px) clamp(16px,4vw,40px) 48px}
.qf-section h2{font-family:var(--fs);font-size:clamp(22px,3vw,34px);font-weight:500;text-align:center;margin-bottom:5px}.qf-section h2 em{font-style:italic;color:var(--gold)}
.qf-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px}
.qf-card{background:var(--card);border:1px solid var(--line2);border-radius:var(--r3);padding:22px}
.fi{margin-bottom:10px}.fi label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.fi input,.fi textarea,.fi select{width:100%;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--text);font-family:var(--ff);font-size:13.5px;outline:none;transition:border-color var(--ease)}.fi input:focus,.fi textarea:focus,.fi select:focus{border-color:var(--gold)}.fi textarea{resize:vertical;min-height:44px}.fi select option{background:var(--bg2)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.cb-item{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid var(--line2);cursor:pointer;transition:all var(--ease);user-select:none}.cb-item:hover{border-color:var(--line3)}.cb-item.sel{background:var(--golddim);border-color:rgba(201,169,110,.3)}
.cb-ck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all var(--ease)}.cb-item.sel .cb-ck{background:var(--gold);border-color:var(--gold);color:var(--btn-text)}
.cb-lb{flex:1;font-size:11.5px;font-weight:500;line-height:1.25}.cb-lb small{display:block;font-size:9.5px;color:var(--text2);font-weight:400}
.cart-total{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line2);margin-top:4px;font-size:13px;font-weight:700}.cart-total span:last-child{color:var(--gold)}
.qf-submit{width:100%;padding:13px;border-radius:var(--r);margin-top:14px;background:var(--gold);color:var(--btn-text);font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all var(--ease);border:none;cursor:pointer;font-family:var(--ff)}.qf-submit:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px var(--goldglow)}

/* === FOOTER === */
.footer{border-top:1px solid var(--line);padding:28px clamp(16px,4vw,40px);text-align:center}.footer p{font-size:10.5px;color:var(--text3)}.footer a{color:var(--gold)}

/* === WA FAB === */
.wa-fab{position:fixed;bottom:18px;right:18px;z-index:999;width:52px;height:52px;border-radius:50%;background:var(--wa);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.3);transition:all var(--ease)}.wa-fab:hover{transform:scale(1.08)}.wa-fab svg{width:22px;height:22px;fill:#fff}

/* === MODALS === */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:16px}.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r3);width:100%;max-width:420px;padding:24px;position:relative;animation:mIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal h3{font-family:var(--fs);font-size:20px;font-weight:500;margin-bottom:2px}.modal h3 em{color:var(--gold);font-style:italic}
.modal .ms{font-size:12px;color:var(--text2);margin-bottom:16px}
.mx{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);cursor:pointer;transition:all var(--ease)}.mx:hover{background:var(--line2);color:var(--text)}

/* === ENGINE === */
function t(k){return L[k]?.[lang]||L[k]?.es||k}
function loc(v){return typeof v==='object'?(v[lang]||v.es||''):v}
function parsePrice(p){const s=typeof p==='object'?(p.es||''):String(p);const m=s.match(/(\d+)/);return m?parseInt(m[1]):0}
function waLink(v){let m=loc(v.wa||{});m=m.replace('%n','2').replace('%d','[fecha]');return`https://wa.me/${WA}?text=${encodeURIComponent(m)}`}

function renderLangBtns(){
  document.getElementById('langGrp').innerHTML=LANGS.map(l=>`<button class="lb${l===lang?' on':''}" data-lang="${l}">${l.toUpperCase()}</button>`).join('');
  document.querySelectorAll('#langGrp .lb').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
}

function renderCatBtns(){
  const cats=['all','water','beach','night','food'];
  document.getElementById('catInner').innerHTML=cats.map(c=>`<button class="cat-btn${c===cat?' on':''}" data-cat="${c}">${t('c_'+c)}</button>`).join('');
  document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>setCat(b.dataset.cat)));
}

function renderFeatured(){
  document.getElementById('featScroll').innerHTML=V.filter(v=>v.feat).map(v=>`
    <a class="feat-card" href="${v.jetski?'javascript:openJetSki()':waLink(v)}" ${v.jetski?'':'target="_blank" rel="noopener"'}>
      <img src="${v.img}" alt="${loc(v.name)}" loading="lazy"><span class="feat-price">${loc(v.price)}</span>
      <div class="feat-info"><span class="feat-tag">${loc(v.bTxt)}</span><h3>${loc(v.name)}</h3><p>${loc(v.desc)}</p></div>
    </a>`).join('');
}

function renderVenues(){
  const g=document.getElementById('vGrid');
  const list=cat==='all'?V:V.filter(v=>v.cat===cat);
  g.innerHTML=list.map((v,i)=>{
    const isJs=v.jetski;
    const href=isJs?'javascript:openJetSki()':waLink(v);
    const tgt=isJs?'':'target="_blank" rel="noopener"';
    return`<div class="v-card rv" style="transition-delay:${i*20}ms">
      <div class="v-img"><img src="${v.img}" alt="${loc(v.name)}" loading="lazy"><span class="v-badge ${v.badge==='premium'?'b-premium':v.badge==='season'?'b-season':'b-open'}">${loc(v.bTxt)}</span></div>
      <div class="v-body"><div class="v-top"><h3>${loc(v.name)}</h3><span class="v-pr">${loc(v.price)}</span></div>
      <div class="v-tags">${(loc(v.tags)||[]).map(t=>`<span class="v-tag">${t}</span>`).join('')}</div>
      <p class="v-desc">${loc(v.desc)}</p>
      <div class="v-acts"><a class="v-wa" href="${href}" ${tgt}>${t('book')}</a>${v.map?`<a class="v-map" href="${v.map}" target="_blank">↗</a>`:''}</div></div></div>`}).join('');
  requestAnimationFrame(()=>{g.querySelectorAll('.rv').forEach((el,i)=>{setTimeout(()=>el.classList.add('vis'),i*25)})});
}

function renderCollections(){
  document.getElementById('colGrid').innerHTML=collections.map(c=>`
    <a class="collection-card" href="https://wa.me/${WA}?text=${encodeURIComponent('Hola! Me interesa '+loc(c.name))}" target="_blank" rel="noopener">
      <img src="${c.img}" alt="${loc(c.name)}" loading="lazy"><div class="col-overlay"></div>
      <div class="col-info"><div class="col-eyebrow">${loc(c.eyebrow)}</div><h3>${loc(c.name)}</h3><p>${loc(c.desc)}</p><span class="col-cta">${loc(c.cta)} →</span></div>
    </a>`).join('');
}

function renderPricing(){document.getElementById('pricingGrid').innerHTML=pricingData.map(p=>`<div class="p-card"><h4>${loc(p.title)}</h4><div class="p-sub">${loc(p.sub)}</div>${p.rows.map(r=>`<div class="p-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')}<div class="p-note">${loc(p.note)}</div></div>`).join('')}
function renderPartners(){document.getElementById('partnerRow').innerHTML=partners.map(p=>`<div class="p-logo" title="${p.n}"><img src="${p.img}" alt="${p.n}"></div>`).join('')}

function populateSelect(){
  document.getElementById('fA').innerHTML=V.filter(v=>!v.jetski).map(v=>`<option value="${v.id}">${loc(v.name)} — ${loc(v.price)}</option>`).join('');
  renderCheckboxes();
}

function renderCheckboxes(){
  document.getElementById('cbGrid').innerHTML=V.map(v=>`<div class="cb-item${cart.includes(v.id)?' sel':''}" onclick="toggleCb('${v.id}')"><span class="cb-ck">✓</span><span class="cb-lb">${loc(v.name)}<small>${loc(v.price)}</small></span></div>`).join('');
  updateTotal();
}
function toggleCb(vid){const i=cart.indexOf(vid);if(i>-1)cart.splice(i,1);else cart.push(vid);renderCheckboxes()}
function updateTotal(){
  const el=document.getElementById('cartTotal'),amt=document.getElementById('totalAmt');
  if(!cart.length){el.style.display='none';return}el.style.display='flex';
  let sum=0,tbc=false;cart.forEach(vid=>{const v=V.find(x=>x.id===vid);if(v){const n=parsePrice(v.price);if(n>0)sum+=n;else tbc=true}});
  amt.textContent=sum>0?(tbc?sum+' € +':sum+' €'):t('qf_tbc');
}

function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');const v=t(k);if(v)el.innerHTML=v})}

/* === JET SKI === */
function openJetSki(){
  document.getElementById('jsModal').classList.add('show');
  renderJsTours();
}
function renderJsTours(){
  document.getElementById('jsTours').innerHTML=jetSkiTours.map(tr=>`
    <div class="jf-tour${tr.id===selTour?' sel':''}" onclick="selTour='${tr.id}';renderJsTours()">
      <span class="jf-radio"></span><div class="jf-tinfo"><div class="jf-tname">${tr.name}</div><div class="jf-tmeta">${tr.dur}</div></div><span class="jf-tprice">${tr.price} €</span>
    </div>`).join('');
}
function submitJetSki(){
  const name=document.getElementById('jsName').value,phone=document.getElementById('jsPhone').value;
  const pax=document.getElementById('jsPax').value,skis=document.getElementById('jsSkis').value;
  const pickup=document.getElementById('jsPickup').value,time=document.getElementById('jsTime').value;
  const notes=document.getElementById('jsNotes').value;
  const tour=jetSkiTours.find(t=>t.id===selTour);
  if(!name||!phone||!pickup||!time||!tour)return;
  let m=`${name}\n${phone}\n${pax} pax\n${skis} jet skis\n${tour.name}\n\nTransport desde:\n${pickup}\n${time}`;
  if(notes)m+=`\n${notes}`;
  showToast(t('toast'));
  setTimeout(()=>{window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank');closeModal('jsModal')},400);
}

/* === GENERIC MODAL === */
function openModal(vid){document.getElementById('bkModal').classList.add('show');if(vid)document.getElementById('fA').value=vid}
function closeModal(id){document.getElementById(id||'bkModal').classList.remove('show')}
function submitBooking(e){
  e.preventDefault();const n=document.getElementById('fN').value,v=V.find(x=>x.id===document.getElementById('fA').value);if(!v)return;
  const d=document.getElementById('fD').value,p=document.getElementById('fP').value,notes=document.getElementById('fNo').value;
  let m=`RESERVA MallorcasLocal\n\nNombre: ${n}\nActividad: ${loc(v.name)}\nFecha: ${d}\nPersonas: ${p}`;
  if(notes)m+=`\nNotas: ${notes}`;m+='\n\nConfirmais disponibilidad?';
  showToast(t('toast'));setTimeout(()=>{window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank');closeModal('bkModal')},400);
}

/* === QUICK FORM === */
function submitQuick(){
  const n=document.getElementById('qN').value;if(!n||!cart.length)return;
  const d=document.getElementById('qD').value,p=document.getElementById('qP').value,notes=document.getElementById('qNo').value;
  let items=cart.map(vid=>{const v=V.find(x=>x.id===vid);return v?`- ${loc(v.name)}`:''}).filter(Boolean).join('\n');
  let sum=cart.reduce((a,vid)=>{const v=V.find(x=>x.id===vid);return a+(v?parsePrice(v.price):0)},0);
  let m=`RESERVA MallorcasLocal\n\nNombre: ${n}\nFecha: ${d}\nPersonas: ${p}\n\nExperiencias:\n${items}\n\nTotal estimado: ${sum>0?sum+' euro':'A confirmar'}`;
  if(notes)m+=`\nNotas: ${notes}`;m+='\n\nConfirmais disponibilidad?';
  showToast(t('toast'));setTimeout(()=>window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank'),400);
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

function setLang(l){
  lang=l;
  const isRtl=RTL_LANGS.includes(l);
  document.documentElement.dir=isRtl?'rtl':'ltr';
  document.documentElement.lang=l;
  renderLangBtns();renderCatBtns();applyI18n();renderFeatured();renderVenues();renderCollections();renderPricing();populateSelect();
}
function setCat(c){cat=c;renderCatBtns();renderVenues()}

/* === INIT === */
document.getElementById('themeBtn').addEventListener('click',()=>document.body.classList.toggle('lm'));
document.getElementById('qfSend').addEventListener('click',submitQuick);
document.getElementById('jsSend').addEventListener('click',submitJetSki);
document.getElementById('bkModal').addEventListener('click',function(e){if(e.target===this)closeModal('bkModal')});
document.getElementById('jsModal').addEventListener('click',function(e){if(e.target===this)closeModal('jsModal')});
document.getElementById('fD').min=new Date().toISOString().split('T')[0];
document.getElementById('qD').min=new Date().toISOString().split('T')[0];
setLang('es');renderPartners();
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{threshold:.06});
setTimeout(()=>document.querySelectorAll('.rv').forEach(el=>obs.observe(el)),200);
</script>
