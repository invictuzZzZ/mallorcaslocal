<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Book Mallorca experiences like a local — parties, boat trips, hidden beaches, nightlife. Direct WhatsApp booking, no fees.">
  <meta name="theme-color" content="#050505" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f6f2" media="(prefers-color-scheme: light)">
  
  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MallorcasLocal — Reserva Mallorca como un local">
  <meta property="og:description" content="Fiestas, excursiones, boat parties y los mejores locales. Sin intermediarios.">
  <meta property="og:image" content="https://res.cloudinary.com/dxhef6dju/image/upload/w_1200,q_auto,f_auto/v1774300396/28_dwfybr.png">
  <meta property="og:url" content="https://mallorcaslocal.com">
  <meta name="twitter:card" content="summary_large_image">
  
  <!-- Preconnect & Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://wa.me">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TravelAgency",
    "name": "MallorcasLocal",
    "description": "Book authentic Mallorca experiences directly via WhatsApp",
    "url": "https://mallorcaslocal.com",
    "areaServed": "Mallorca, Spain",
    "availableLanguage": ["en","es","de","fr","it","ar","ru"],
    "priceRange": "€€"
  }
  </script>

  <title>MallorcasLocal — Reserva Mallorca como un local</title>
  
  <style>
    /* ===== CSS RESET & BASE ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scroll-padding-top:72px;-webkit-text-size-adjust:100%}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
    body{background:var(--bg);color:var(--text);font-family:var(--ff);font-weight:400;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
    :focus:not(:focus-visible){outline:none}
    img{display:block;max-width:100%;height:auto}
    a{text-decoration:none;color:inherit;transition:color var(--ease)}
    button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}
    ::selection{background:var(--gold);color:#000}
    
    /* ===== CSS VARIABLES — ENHANCED ===== */
    :root{
      /* Core */
      --bg:#050505;--bg2:#0f0f0f;--bg3:#1a1a1a;--card:#111;--surface:rgba(255,255,255,.03);
      /* Lines & Borders */
      --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.1);--line3:rgba(255,255,255,.18);--line-glow:rgba(201,169,110,.3);
      /* Text */
      --text:#f5f5f5;--text2:rgba(255,255,255,.65);--text3:rgba(255,255,255,.35);--text-inv:#0a0a0a;
      /* Accent */
      --gold:#c9a96e;--gold2:#e6c98e;--golddim:rgba(201,169,110,.12);--goldglow:rgba(201,169,110,.35);--gold-glow-2:0 0 32px rgba(201,169,110,.25);
      --wa:#25d366;--wa-glow:0 0 24px rgba(37,211,102,.35);
      /* UI */
      --ff:'DM Sans',system-ui,-apple-system,sans-serif;--fs:'Playfair Display',Georgia,serif;--fm:'JetBrains Mono',monospace;
      --ease:250ms cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(.0,0,.2,1);--ease-in:cubic-bezier(.4,0,1,1);
      --r:12px;--r2:16px;--r3:24px;--r4:32px;--rmax:999px;--shadow:0 4px 24px rgba(0,0,0,.35);--shadow-lg:0 12px 48px rgba(0,0,0,.5);
      --blur:blur(24px);--blur-sm:blur(12px);
      --container:1280px;--gap:16px;--gap-lg:24px;
      --z-toast:1100;--z-modal:1000;--z-fab:999;--z-nav:900;--z-hero:100;
      --btn-text:#0a0a0a;--btn-text-inv:#fff;
      /* Animation */
      --anim-fade:opacity .4s var(--ease-out),transform .4s var(--ease-out);
      --anim-slide:opacity .5s var(--ease-out),transform .5s var(--ease-out);
      --anim-scale:transform .3s var(--ease),opacity .2s var(--ease);
    }
    
    /* Light Mode — Enhanced */
    [data-theme="light"]{
      --bg:#faf9f6;--bg2:#f0efea;--bg3:#e5e3dc;--card:#fff;--surface:rgba(0,0,0,.03);
      --line:rgba(0,0,0,.06);--line2:rgba(0,0,0,.1);--line3:rgba(0,0,0,.18);--line-glow:rgba(154,122,60,.25);
      --text:#1a1a1a;--text2:rgba(0,0,0,.6);--text3:rgba(0,0,0,.35);
      --gold:#9a7a3c;--gold2:#b89a5e;--golddim:rgba(154,122,60,.1);--goldglow:rgba(154,122,60,.2);--gold-glow-2:0 0 32px rgba(154,122,60,.18);
      --btn-text:#fff;--btn-text-inv:#0a0a0a;
    }
    [data-theme="light"]::before{opacity:.08}
    [data-theme="light"] .glass{background:rgba(255,255,255,.75);border-color:rgba(0,0,0,.08)}
    [data-theme="light"] .hero-bg img{opacity:.45;filter:saturate(.9) brightness(1.02)}
    
    /* ===== TEXTURE OVERLAY — SUBTLE NOISE ===== */
    body::before{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      opacity:.25;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size:256px;animation:noise 2s steps(1) infinite;
    }
    @keyframes noise{0%,100%{transform:translate(0,0)}10%{transform:translate(-1%,1%)}20%{transform:translate(1%,-1%)}30%{transform:translate(-1%,-1%)}40%{transform:translate(1%,1%)}50%{transform:translate(-1%,0)}60%{transform:translate(1%,0)}70%{transform:translate(0,-1%)}80%{transform:translate(0,1%)}90%{transform:translate(-1%,1%)}}
    
    /* ===== GLASSMORPHISM UTILS ===== */
    .glass{
      background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border:1px solid var(--line);border-radius:var(--r2);transition:border-color var(--ease),background var(--ease)
    }
    .glass:hover{border-color:var(--line2)}
    
    /* ===== TYPOGRAPHY — ENHANCED ===== */
    .text-gradient{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      display:inline-block;font-weight:600
    }
    .text-glow{text-shadow:var(--gold-glow-2)}
    .fs-display{font-family:var(--fs);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:500;line-height:1.02;letter-spacing:-.025em}
    .fs-h1{font-family:var(--fs);font-size:clamp(1.875rem,4vw,3rem);font-weight:500;line-height:1.05;letter-spacing:-.02em}
    .fs-h2{font-family:var(--fs);font-size:clamp(1.5rem,3vw,2.25rem);font-weight:500;letter-spacing:-.015em}
    .fs-body{font-size:clamp(.875rem,1.2vw,1rem);color:var(--text2)}
    .fs-sm{font-size:.8125rem;color:var(--text3);line-height:1.5}
    .fs-mono{font-family:var(--fm);font-size:.75rem;letter-spacing:.02em}
    
    /* ===== LAYOUT ===== */
    .container{width:100%;max-width:var(--container);margin-inline:auto;padding-inline:clamp(1rem,4vw,2rem)}
    .section{padding-block:clamp(3rem,8vh,5rem)}
    .section-header{max-width:680px;margin-inline:auto;text-align:center;margin-bottom:clamp(2rem,4vh,3rem)}
    .section-header h2 em{font-style:italic;color:var(--gold)}
    .section-header p{margin-top:.5rem;color:var(--text2);max-width:480px;margin-inline:auto}
    
    /* ===== TOPBAR — ENHANCED ===== */
    .topbar{
      position:sticky;top:0;z-index:var(--z-nav);height:64px;
      background:rgba(5,5,5,.85);border-bottom:1px solid var(--line);
      backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
      display:flex;align-items:center;justify-content:space-between;
      padding-inline:clamp(1rem,4vw,2rem);transition:all var(--ease);
    }
    [data-theme="light"] .topbar{background:rgba(250,249,246,.92)}
    .topbar.scrolled{height:56px;background:rgba(5,5,5,.95);box-shadow:0 4px 24px rgba(0,0,0,.25)}
    [data-theme="light"] .topbar.scrolled{background:rgba(250,249,246,.98)}
    
    .tb-logo{
      font-family:var(--fs);font-size:1.125rem;font-weight:600;letter-spacing:-.02em;
      display:flex;align-items:center;gap:.375rem;transition:transform var(--ease)
    }
    .tb-logo:hover{transform:translateY(-1px)}
    .tb-logo span{color:var(--gold);font-style:italic;font-weight:700}
    .tb-logo::after{
      content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:0;transition:opacity var(--ease);border-radius:2px
    }
    .tb-logo:hover::after{opacity:1}
    
    .tb-actions{display:flex;align-items:center;gap:.25rem}
    
    .lang-switch{
      display:flex;gap:2px;padding:3px;background:var(--surface);
      border:1px solid var(--line);border-radius:8px;overflow:hidden
    }
    .lang-btn{
      padding:4px 8px;font-size:.6875rem;font-weight:600;letter-spacing:.05em;
      text-transform:uppercase;color:var(--text3);border-radius:6px;
      transition:all var(--ease);min-width:28px;text-align:center
    }
    .lang-btn:hover{color:var(--text2);background:var(--line)}
    .lang-btn.active{color:var(--gold);background:var(--golddim);font-weight:700}
    
    .theme-toggle{
      width:36px;height:36px;border-radius:10px;margin-left:4px;
      display:flex;align-items:center;justify-content:center;
      color:var(--text2);font-size:1rem;transition:all var(--ease);
      position:relative;overflow:hidden
    }
    .theme-toggle::before{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:radial-gradient(circle at 30% 30%,var(--gold),transparent 60%);
      opacity:0;transition:opacity var(--ease)
    }
    .theme-toggle:hover{color:var(--text);background:var(--line)}
    .theme-toggle:hover::before{opacity:.15}
    
    /* ===== HERO — CINEMATIC ===== */
    .hero{
      position:relative;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;
      padding-block-end:clamp(3rem,8vh,6rem);overflow:hidden;isolation:isolate
    }
    .hero-bg{
      position:absolute;inset:0;z-index:-2;transform:scale(1.02)
    }
    .hero-bg img{
      width:100%;height:100%;object-fit:cover;opacity:.4;filter:saturate(.7) contrast(1.05);
      transition:transform .8s var(--ease-out),opacity .6s var(--ease)
    }
    .hero:hover .hero-bg img{transform:scale(1.04)}
    .hero-bg::after{
      content:'';position:absolute;inset:0;z-index:-1;
      background:linear-gradient(to top,var(--bg) 0%,rgba(5,5,5,.7) 35%,rgba(5,5,5,.3) 65%,transparent 100%)
    }
    [data-theme="light"] .hero-bg::after{
      background:linear-gradient(to top,var(--bg) 0%,rgba(250,249,246,.6) 35%,rgba(250,249,246,.2) 65%,transparent 100%)
    }
    
    .hero-content{
      position:relative;z-index:1;max-width:720px;margin-inline:auto;text-align:center;
      padding-inline:clamp(1rem,4vw,2rem);animation:heroIn .8s var(--ease-out) both
    }
    @keyframes heroIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    
    .hero-badge{
      display:inline-flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;
      padding:.375rem 1rem;border-radius:var(--rmax);border:1px solid var(--line2);
      font-size:.6875rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--text2);background:var(--surface);backdrop-filter:var(--blur-sm)
    }
    .hero-dot{
      width:6px;height:6px;border-radius:50%;background:var(--gold);
      box-shadow:0 0 0 3px var(--golddim);animation:pulse 2.5s infinite
    }
    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--golddim)}50%{box-shadow:0 0 0 10px transparent}}
    
    .hero h1{margin-bottom:1rem}
    .hero h1 em{font-style:italic;color:var(--gold);position:relative}
    .hero h1 em::after{
      content:'';position:absolute;bottom:2px;left:-2px;right:-2px;height:4px;
      background:var(--gold);opacity:.15;border-radius:2px;z-index:-1
    }
    
    .hero-p{
      font-size:clamp(.9375rem,1.5vw,1.0625rem);color:var(--text2);
      max-width:560px;margin-inline:auto;margin-bottom:2rem;line-height:1.7
    }
    
    .hero-ctas{
      display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;
      margin-bottom:2.5rem
    }
    
    /* ===== BUTTONS — ENHANCED ===== */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
      padding:.8125rem 1.75rem;border-radius:var(--rmax);font-weight:600;
      font-size:.8125rem;letter-spacing:.01em;transition:all var(--ease);
      position:relative;overflow:hidden;will-change:transform
    }
    .btn::before{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 50%);
      opacity:0;transition:opacity var(--ease)
    }
    .btn:hover::before{opacity:1}
    .btn:active{transform:translateY(1px) scale(.99)}
    
    .btn-primary{
      background:var(--gold);color:var(--btn-text);
      box-shadow:0 4px 16px var(--goldglow)
    }
    .btn-primary:hover{
      filter:brightness(1.08);transform:translateY(-2px);
      box-shadow:0 8px 32px var(--goldglow)
    }
    
    .btn-secondary{
      background:transparent;color:var(--text);border:1px solid var(--line2)
    }
    .btn-secondary:hover{border-color:var(--line3);background:var(--surface)}
    
    .btn-ghost{
      background:transparent;color:var(--text2);border:1px solid var(--line)
    }
    .btn-ghost:hover{color:var(--text);border-color:var(--line2);background:var(--surface)}
    
    .btn-icon{padding:.625rem;border-radius:12px;width:44px;height:44px}
    
    /* Scroll Indicator */
    .hero-scroll{
      position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
      z-index:1;font-size:.625rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:.5rem;
      animation:bob 2.5s ease-in-out infinite
    }
    @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
    .hero-scroll::after{
      content:'';width:1px;height:24px;background:linear-gradient(to bottom,var(--text3),transparent)
    }
    .hero-scroll svg{width:18px;height:18px;opacity:.6}
    
    /* ===== TRUST BAR — ENHANCED ===== */
    .trust{
      display:flex;justify-content:center;gap:clamp(1.5rem,4vw,3.5rem);
      padding:1.5rem clamp(1rem,4vw,2rem);border-bottom:1px solid var(--line);
      background:var(--bg2);position:relative;z-index:10
    }
    .trust::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(ellipse at top,transparent 60%,var(--bg2) 100%)
    }
    .trust-item{text-align:center;min-width:64px}
    .trust-item strong{
      display:block;font-family:var(--fs);font-size:clamp(1.375rem,2.5vw,2.125rem);
      font-weight:500;letter-spacing:-.02em;color:var(--gold);line-height:1
    }
    .trust-item span{
      font-size:.625rem;color:var(--text2);text-transform:uppercase;
      letter-spacing:.08em;font-weight:600;margin-top:.25rem;display:block
    }
    
    /* ===== FEATURED CAROUSEL — MAGNETIC ===== */
    .featured{padding-block-end:1rem}
    .feat-scroll{
      display:flex;gap:var(--gap);overflow-x:auto;scrollbar-width:none;
      padding-inline:clamp(1rem,4vw,2rem);scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch
    }
    .feat-scroll::-webkit-scrollbar{display:none}
    
    .feat-card{
      flex:0 0 clamp(14rem,32vw,20rem);scroll-snap-align:start;
      border-radius:var(--r3);overflow:hidden;position:relative;
      aspect-ratio:3/4;cursor:pointer;transition:transform var(--ease);
      will-change:transform
    }
    .feat-card:hover{transform:translateY(-4px)}
    .feat-card img{
      width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease-out)
    }
    .feat-card:hover img{transform:scale(1.06)}
    .feat-card::after{
      content:'';position:absolute;inset:0;z-index:1;
      background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.2) 50%,transparent 100%);
      transition:background .4s var(--ease)
    }
    .feat-card:hover::after{
      background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.4) 40%,rgba(0,0,0,.1) 100%)
    }
    
    .feat-info{
      position:absolute;bottom:0;left:0;right:0;z-index:2;
      padding:1rem;transform:translateY(4px);transition:transform .3s var(--ease)
    }
    .feat-card:hover .feat-info{transform:translateY(0)}
    
    .feat-tag{
      display:inline-flex;align-items:center;gap:.375rem;
      padding:.25rem .625rem;border-radius:var(--rmax);
      font-size:.625rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;background:var(--golddim);
      color:var(--gold);border:1px solid var(--line-glow);
      margin-bottom:.5rem
    }
    .feat-tag::before{
      content:'';width:4px;height:4px;border-radius:50%;background:var(--gold)
    }
    
    .feat-info h3{
      font-family:var(--fs);font-size:1.125rem;font-weight:500;
      margin-bottom:.25rem;color:#fff;line-height:1.2
    }
    .feat-info p{
      font-size:.75rem;color:rgba(255,255,255,.75);line-height:1.45;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
      overflow:hidden;transition:all .3s var(--ease)
    }
    .feat-card:hover .feat-info p{-webkit-line-clamp:4;color:rgba(255,255,255,.9)}
    
    .feat-price{
      position:absolute;top:.75rem;right:.75rem;z-index:2;
      padding:.375rem .875rem;border-radius:var(--rmax);
      background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);font-size:.75rem;
      font-weight:700;color:var(--gold);font-family:var(--fm)
    }
    
    /* ===== CATEGORY NAV — STICKY ===== */
    .cat-nav{
      position:sticky;top:64px;z-index:var(--z-nav);
      background:rgba(5,5,5,.92);backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--line);
      padding:.625rem clamp(1rem,4vw,2rem);transition:all var(--ease)
    }
    [data-theme="light"] .cat-nav{background:rgba(250,249,246,.96)}
    
    .cat-inner{
      display:flex;gap:.375rem;max-width:var(--container);margin-inline:auto;
      overflow-x:auto;scrollbar-width:none;padding-block:.25rem
    }
    .cat-inner::-webkit-scrollbar{display:none}
    
    .cat-btn{
      padding:.5rem 1rem;border-radius:var(--rmax);font-size:.75rem;
      font-weight:600;white-space:nowrap;color:var(--text2);
      border:1px solid transparent;transition:all var(--ease);
      position:relative;overflow:hidden
    }
    .cat-btn::after{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:var(--golddim);opacity:0;transition:opacity var(--ease)
    }
    .cat-btn:hover{color:var(--text);background:var(--surface)}
    .cat-btn.active{color:var(--btn-text);border-color:var(--gold)}
    .cat-btn.active::after{opacity:1}
    
    /* ===== VENUE GRID — HOVER REVEAL ===== */
    .grid-wrap{padding-block-end:3rem}
    .venue-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(14rem,1fr));
      gap:var(--gap)
    }
    @media(max-width:640px){.venue-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
    @media(max-width:400px){.venue-grid{grid-template-columns:1fr}}
    
    .v-card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--r2);
      overflow:hidden;transition:all var(--ease);position:relative;
      will-change:transform
    }
    .v-card:hover{
      border-color:var(--line3);transform:translateY(-4px);
      box-shadow:var(--shadow-lg)
    }
    .v-card::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      border-radius:inherit;box-shadow:inset 0 0 0 1px var(--line-glow);
      opacity:0;transition:opacity var(--ease)
    }
    .v-card:hover::after{opacity:1}
    
    .v-img{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--bg2)}
    .v-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease-out)}
    .v-card:hover .v-img img{transform:scale(1.05)}
    
    /* Hover Overlay with Description */
    .v-img-overlay{
      position:absolute;inset:0;z-index:2;
      background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.5) 40%,rgba(0,0,0,.2) 100%);
      opacity:0;transition:opacity .4s var(--ease);display:flex;align-items:flex-end;
      padding:1rem
    }
    .v-card:hover .v-img-overlay{opacity:1}
    .v-img-overlay p{
      font-size:.8125rem;color:rgba(255,255,255,.92);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
      overflow:hidden
    }
    
    .v-badge{
      position:absolute;top:.5rem;left:.5rem;padding:.25rem .625rem;
      border-radius:var(--rmax);font-size:.625rem;font-weight:700;
      letter-spacing:.05em;text-transform:uppercase;backdrop-filter:blur(8px);
      z-index:3;border:1px solid
    }
    .b-open{background:rgba(201,169,110,.18);color:var(--gold);border-color:rgba(201,169,110,.25)}
    .b-season{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.15)}
    .b-premium{background:rgba(201,169,110,.35);color:#fff;border-color:rgba(201,169,110,.5);box-shadow:0 0 0 1px var(--gold)}
    
    .v-body{padding:.75rem}
    .v-top{display:flex;align-items:center;justify-content:space-between;gap:.375rem;margin-bottom:.375rem}
    .v-top h3{
      font-size:.8125rem;font-weight:700;letter-spacing:-.01em;
      flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .v-pr{
      font-size:.75rem;font-weight:700;color:var(--gold);white-space:nowrap;
      font-family:var(--fm)
    }
    
    .v-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.5rem}
    .v-tag{
      font-size:.6875rem;color:var(--text2);padding:.125rem .5rem;
      border-radius:var(--rmax);background:var(--surface);
      border:1px solid var(--line)
    }
    
    .v-desc{
      font-size:.75rem;color:var(--text2);line-height:1.45;
      margin-bottom:.625rem;display:-webkit-box;-webkit-line-clamp:2;
      -webkit-box-orient:vertical;overflow:hidden
    }
    
    .v-acts{display:flex;gap:.375rem}
    .v-wa{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:.625rem;border-radius:10px;background:var(--gold);
      color:var(--btn-text);font-size:.75rem;font-weight:700;
      transition:all var(--ease)
    }
    .v-wa:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 16px var(--goldglow)}
    .v-map{
      width:36px;height:36px;border-radius:10px;
      background:var(--surface);border:1px solid var(--line2);
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;transition:all var(--ease);flex-shrink:0
    }
    .v-map:hover{background:var(--line);color:var(--gold)}
    
    /* ===== COLLECTIONS — PARALLAX ===== */
    .collections-wrap{padding-block-end:3rem}
    .col-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(13.5rem,1fr));
      gap:var(--gap)
    }
    
    .collection-card{
      position:relative;border-radius:var(--r3);overflow:hidden;
      aspect-ratio:3/4;cursor:pointer;transition:all var(--ease);
      will-change:transform
    }
    .collection-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .collection-card img{
      width:100%;height:100%;object-fit:cover;
      transition:transform .7s var(--ease-out)
    }
    .collection-card:hover img{transform:scale(1.05)}
    
    .col-overlay{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 60%,transparent 100%)
    }
    
    .col-info{
      position:absolute;bottom:0;left:0;right:0;z-index:2;
      padding:1.25rem;transform:translateY(6px);transition:transform .3s var(--ease)
    }
    .collection-card:hover .col-info{transform:translateY(0)}
    
    .col-eyebrow{
      font-size:.625rem;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--gold);margin-bottom:.375rem
    }
    .col-info h3{
      font-family:var(--fs);font-size:1.125rem;font-weight:500;
      color:#fff;margin-bottom:.25rem;line-height:1.2
    }
    .col-info p{
      font-size:.75rem;color:rgba(255,255,255,.7);line-height:1.4
    }
    .col-cta{
      display:inline-flex;align-items:center;gap:.375rem;
      margin-top:.625rem;font-size:.75rem;font-weight:600;
      color:var(--gold);letter-spacing:.01em;transition:gap var(--ease)
    }
    .collection-card:hover .col-cta{gap:.75rem}
    .col-cta::after{
      content:'→';transition:transform var(--ease);display:inline-block
    }
    .collection-card:hover .col-cta::after{transform:translateX(4px)}
    
    /* ===== PRICING — CLEAN CARDS ===== */
    .pricing-section{padding-block-end:3rem}
    .pricing-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(16rem,1fr));
      gap:var(--gap)
    }
    
    .p-card{
      background:var(--card);border:1px solid var(--line);
      border-radius:var(--r2);padding:1.25rem;transition:all var(--ease)
    }
    .p-card:hover{border-color:var(--line-glow);transform:translateY(-2px)}
    .p-card.featured{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),var(--shadow)}
    
    .p-card h4{
      font-family:var(--fs);font-size:1.0625rem;font-weight:500;
      margin-bottom:.25rem
    }
    .p-card .p-sub{
      font-size:.75rem;color:var(--text2);margin-bottom:1rem
    }
    
    .p-row{
      display:flex;justify-content:space-between;padding:.375rem 0;
      border-bottom:1px solid var(--line);font-size:.8125rem
    }
    .p-row:last-child{border:none}
    .p-row span:last-child{font-weight:700;color:var(--gold);font-family:var(--fm)}
    
    .p-note{
      font-size:.6875rem;color:var(--text3);margin-top:.75rem;
      line-height:1.5;padding:.5rem;background:var(--surface);
      border-radius:var(--r);border-left:2px solid var(--gold)
    }
    
    /* ===== PARTNERS — LOGO GRID ===== */
    .partners{
      padding-block:2.5rem;border-block:1px solid var(--line);
      background:var(--bg2)
    }
    .partners h3{
      text-align:center;font-size:.6875rem;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text2);
      margin-bottom:1.5rem
    }
    .partner-row{
      display:flex;justify-content:center;flex-wrap:wrap;
      gap:clamp(1rem,3vw,2rem)
    }
    .p-logo{
      width:72px;height:72px;border-radius:50%;
      background:var(--surface);border:1px solid var(--line2);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;transition:all var(--ease);position:relative
    }
    .p-logo::after{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:radial-gradient(circle at 30% 30%,var(--gold),transparent 60%);
      opacity:0;transition:opacity var(--ease)
    }
    .p-logo:hover{border-color:var(--gold);transform:scale(1.12);box-shadow:0 8px 24px var(--goldglow)}
    .p-logo:hover::after{opacity:.15}
    .p-logo img{
      width:48px;height:48px;object-fit:contain;
      filter:brightness(1.4) contrast(1.05);transition:filter var(--ease)
    }
    .p-logo:hover img{filter:brightness(1.8) contrast(1.15)}
    
    /* ===== QUICK FORM — MODERN ===== */
    .qf-section{padding-block:clamp(3rem,6vh,4.5rem)}
    .qf-section h2{text-align:center;margin-bottom:.5rem}
    .qf-section h2 em{font-style:italic;color:var(--gold)}
    .qf-sub{
      font-size:.875rem;color:var(--text2);text-align:center;
      margin-bottom:1.5rem;max-width:480px;margin-inline:auto
    }
    
    .qf-card{
      background:var(--card);border:1px solid var(--line2);
      border-radius:var(--r3);padding:1.5rem;max-width:560px;
      margin-inline:auto;box-shadow:var(--shadow)
    }
    
    .fi{margin-bottom:.875rem}
    .fi label{
      display:block;font-size:.6875rem;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;
      color:var(--text3);margin-bottom:.375rem
    }
    .fi input,.fi textarea,.fi select{
      width:100%;padding:.625rem .875rem;border-radius:10px;
      background:var(--surface);border:1px solid var(--line2);
      color:var(--text);font-family:var(--ff);font-size:.9375rem;
      transition:border-color var(--ease),box-shadow var(--ease)
    }
    .fi input:focus,.fi textarea:focus,.fi select:focus{
      border-color:var(--gold);box-shadow:0 0 0 3px var(--golddim)
    }
    .fi textarea{resize:vertical;min-height:52px}
    
    .fi-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    
    /* Checkbox Grid — Enhanced */
    .cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
    .cb-item{
      display:flex;align-items:center;gap:.5rem;padding:.625rem .75rem;
      border-radius:10px;background:var(--surface);border:1px solid var(--line2);
      cursor:pointer;transition:all var(--ease);user-select:none
    }
    .cb-item:hover{border-color:var(--line3);background:var(--line)}
    .cb-item.active{
      background:var(--golddim);border-color:var(--gold);
      box-shadow:0 0 0 1px var(--gold)
    }
    .cb-ck{
      width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line3);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:all var(--ease);font-size:.75rem;color:transparent
    }
    .cb-item.active .cb-ck{
      background:var(--gold);border-color:var(--gold);
      color:var(--btn-text);animation:checkIn .2s var(--ease)
    }
    @keyframes checkIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .cb-lb{flex:1;font-size:.8125rem;font-weight:500;line-height:1.3}
    .cb-lb small{
      display:block;font-size:.75rem;color:var(--text2);
      font-weight:400;font-family:var(--fm)
    }
    
    .cart-total{
      display:flex;justify-content:space-between;padding:.625rem 0;
      border-top:1px solid var(--line2);margin-top:.5rem;
      font-size:.875rem;font-weight:700
    }
    .cart-total span:last-child{color:var(--gold);font-family:var(--fm)}
    
    .qf-submit{
      width:100%;padding:.875rem;border-radius:var(--r2);
      margin-top:1rem;background:var(--gold);color:var(--btn-text);
      font-size:.875rem;font-weight:700;display:flex;align-items:center;
      justify-content:center;gap:.5rem;transition:all var(--ease);
      border:none;cursor:pointer;font-family:var(--ff)
    }
    .qf-submit:hover{
      filter:brightness(1.08);transform:translateY(-2px);
      box-shadow:0 8px 28px var(--goldglow)
    }
    .qf-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
    
    /* ===== FOOTER — MINIMAL ===== */
    .footer{
      border-top:1px solid var(--line);padding-block:1.75rem;
      text-align:center;margin-top:auto
    }
    .footer p{font-size:.75rem;color:var(--text3)}
    .footer a{color:var(--gold);font-weight:500}
    .footer a:hover{text-decoration:underline}
    
    /* ===== WA FAB — FLOATING ===== */
    .wa-fab{
      position:fixed;bottom:clamp(1rem,3vh,1.5rem);right:clamp(1rem,3vw,1.5rem);
      z-index:var(--z-fab);width:56px;height:56px;border-radius:50%;
      background:var(--wa);color:#fff;display:flex;align-items:center;
      justify-content:center;box-shadow:var(--wa-glow);
      transition:all var(--ease);will-change:transform
    }
    .wa-fab:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 32px rgba(37,211,102,.5)}
    .wa-fab:active{transform:scale(.98)}
    .wa-fab svg{width:24px;height:24px;fill:#fff;transition:transform var(--ease)}
    .wa-fab:hover svg{animation:wiggle .4s var(--ease)}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
    
    /* ===== MODALS — POLISHED ===== */
    .modal-bg{
      position:fixed;inset:0;z-index:var(--z-modal);
      background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
      display:none;align-items:center;justify-content:center;
      padding:1rem;opacity:0;transition:opacity .3s var(--ease)
    }
    .modal-bg.active{display:flex;opacity:1}
    
    .modal{
      background:var(--bg2);border:1px solid var(--line2);
      border-radius:var(--r3);width:100%;max-width:440px;
      padding:1.5rem;position:relative;animation:modalIn .3s var(--ease-out);
      max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)
    }
    @keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
    
    .modal h3{
      font-family:var(--fs);font-size:1.25rem;font-weight:500;
      margin-bottom:.25rem
    }
    .modal h3 em{color:var(--gold);font-style:italic}
    .modal .ms{
      font-size:.8125rem;color:var(--text2);margin-bottom:1.25rem
    }
    
    .mx{
      position:absolute;top:.75rem;right:.75rem;width:32px;height:32px;
      border-radius:50%;background:var(--surface);border:1px solid var(--line2);
      display:flex;align-items:center;justify-content:center;
      font-size:1.125rem;color:var(--text2);cursor:pointer;
      transition:all var(--ease)
    }
    .mx:hover{background:var(--line);color:var(--text);transform:rotate(90deg)}
    
    /* Jet Ski Modal Specifics */
    .jf-tours{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
    .jf-tour{
      display:flex;align-items:center;gap:.75rem;padding:.75rem;
      border-radius:10px;background:var(--surface);border:1px solid var(--line2);
      cursor:pointer;transition:all var(--ease)
    }
    .jf-tour:hover{border-color:var(--line3);background:var(--line)}
    .jf-tour.active{
      background:var(--golddim);border-color:var(--gold);
      box-shadow:0 0 0 1px var(--gold)
    }
    .jf-radio{
      width:20px;height:20px;border-radius:50%;border:2px solid var(--line3);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:all var(--ease)
    }
    .jf-tour.active .jf-radio{border-color:var(--gold)}
    .jf-tour.active .jf-radio::after{
      content:'';width:10px;height:10px;border-radius:50%;
      background:var(--gold);animation:radioIn .2s var(--ease)
    }
    @keyframes radioIn{from{transform:scale(0)}to{transform:scale(1)}}
    .jf-tinfo{flex:1}
    .jf-tname{font-size:.875rem;font-weight:600}
    .jf-tmeta{font-size:.75rem;color:var(--text2)}
    .jf-tprice{font-size:.875rem;font-weight:700;color:var(--gold);font-family:var(--fm)}
    
    .f-submit,.jf-submit{
      width:100%;padding:.875rem;border-radius:var(--r2);
      margin-top:1rem;background:var(--gold);color:var(--btn-text);
      font-size:.875rem;font-weight:700;display:flex;align-items:center;
      justify-content:center;gap:.5rem;transition:all var(--ease);
      border:none;cursor:pointer;font-family:var(--ff)
    }
    .f-submit:hover,.jf-submit:hover{
      filter:brightness(1.08);transform:translateY(-2px);
      box-shadow:0 8px 28px var(--goldglow)
    }
    
    /* ===== TOAST — SMOOTH ===== */
    .toast{
      position:fixed;bottom:calc(56px + 1rem);left:50%;transform:translateX(-50%) translateY(16px);
      padding:.625rem 1.25rem;border-radius:var(--rmax);
      background:var(--gold);color:#fff;font-size:.8125rem;
      font-weight:600;opacity:0;pointer-events:none;
      transition:all .3s var(--ease);z-index:var(--z-toast);
      box-shadow:0 8px 24px rgba(0,0,0,.3);backdrop-filter:blur(8px)
    }
    .toast.active{opacity:1;transform:translateX(-50%) translateY(0)}
    
    /* ===== REVEAL ON SCROLL ===== */
    .reveal{opacity:0;transform:translateY(24px);transition:var(--anim-slide)}
    .reveal.active{opacity:1;transform:none}
    
    /* ===== RTL SUPPORT ===== */
    [dir="rtl"] .topbar{flex-direction:row-reverse}
    [dir="rtl"] .tb-actions{flex-direction:row-reverse}
    [dir="rtl"] .lang-switch{flex-direction:row-reverse}
    [dir="rtl"] .hero-content{text-align:right}
    [dir="rtl"] .hero-ctas{justify-content:center}
    [dir="rtl"] .fi-row{direction:rtl}
    [dir="rtl"] .v-top{flex-direction:row-reverse}
    [dir="rtl"] .cat-inner{flex-direction:row-reverse}
    [dir="rtl"] .trust{flex-direction:row-reverse}
    [dir="rtl"] .cb-item{flex-direction:row-reverse}
    [dir="rtl"] .jf-tour{flex-direction:row-reverse}
    
    /* ===== RESPONSIVE ===== */
    @media(max-width:768px){
      .hero h1{margin-bottom:.75rem}
      .trust{flex-wrap:wrap;gap:1rem;padding:1.25rem 1rem}
      .trust-item{min-width:56px}
      .trust-item strong{font-size:1.25rem}
      .feat-card{flex:0 0 72vw}
      .section-header{padding-inline:1rem}
      .cb-grid,.fi-row{grid-template-columns:1fr}
    }
    @media(max-width:480px){
      .feat-card{flex:0 0 85vw}
      .venue-grid,.col-grid{grid-template-columns:1fr !important}
      .pricing-grid{grid-template-columns:1fr}
      .hero-ctas{flex-direction:column;gap:.625rem}
      .hero-ctas .btn{width:100%;justify-content:center}
      .trust{gap:.75rem 1.25rem}
      .trust-item strong{font-size:1.125rem}
      .qf-card{padding:1.25rem}
    }
    
    /* ===== ACCESSIBILITY ===== */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
    }
    
    /* ===== PRINT ===== */
    @media print{
      .topbar,.wa-fab,.hero-scroll,.cat-nav{display:none !important}
      body{background:#fff;color:#000}
      .hero{min-height:auto;padding-block:2rem}
      .hero-bg{display:none}
    }
  </style>
</head>

<body>
  <!-- Skip Link for Accessibility -->
  <a href="#main" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden">Skip to content</a>
  
  <!-- Top Navigation -->
  <header class="topbar" role="banner">
    <a href="#" class="tb-logo" aria-label="MallorcasLocal Home">
      Mallorcas<span>Local</span>
    </a>
    <div class="tb-actions">
      <div class="lang-switch" id="langGrp" role="group" aria-label="Select language"></div>
      <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme" title="Toggle light/dark mode">◑</button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero" aria-labelledby="hero-title">
    <div class="hero-bg">
      <img src="https://res.cloudinary.com/dxhef6dju/image/upload/w_1400,q_auto,f_auto/v1774300396/28_dwfybr.png" 
           alt="Stunning Mallorca coastline at sunset" 
           width="1400" height="933" 
           loading="eager" fetchpriority="high">
    </div>
    <div class="hero-content">
      <div class="hero-badge">
        <span class="hero-dot" aria-hidden="true"></span>
        <span data-i18n="h_badge"></span>
      </div>
      <h1 id="hero-title" class="fs-display" data-i18n="h_h1"></h1>
      <p class="hero-p fs-body" data-i18n="h_p"></p>
      <div class="hero-ctas">
        <a href="#plans" class="btn btn-primary" data-i18n="h_cta1">
          <span>🗺️</span><span data-i18n="h_cta1"></span>
        </a>
        <button class="btn btn-secondary" onclick="openModal()" data-i18n="h_cta2">
          <span>✨</span><span data-i18n="h_cta2"></span>
        </button>
      </div>
    </div>
    <a href="#trust" class="hero-scroll" aria-label="Scroll to explore">
      <span data-i18n="h_scroll"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </a>
  </section>

  <!-- Trust Bar -->
  <div class="trust" id="trust" role="list" aria-label="Key benefits">
    <div class="trust-item" role="listitem">
      <strong>19+</strong>
      <span data-i18n="t1"></span>
    </div>
    <div class="trust-item" role="listitem">
      <strong>4.8</strong>
      <span data-i18n="t2"></span>
    </div>
    <div class="trust-item" role="listitem">
      <strong>&lt;1h</strong>
      <span data-i18n="t3"></span>
    </div>
    <div class="trust-item" role="listitem">
      <strong>0€</strong>
      <span data-i18n="t4"></span>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main" role="main">
    <!-- Featured Section -->
    <div class="section">

      {id:'jet-ski',cat:'water',feat:true,badge:'open',bTxt:{es:'Abierto',en:'Open',de:'Geöffnet',fr:'Ouvert',it:'Aperto',ar:'مفتوح',ru:'Открыто'},name:'Jet Ski Tour',img:'https://res.cloudinary.com/dxhef6dju/image/upload/w_640,h_800,c_fill,q_auto,f_auto/v1774107976/5_d0638s.png',price:{es:'Desde 99 €',en:'From 99 €',de:'Ab 99 €',fr:'Dès 99 €',it:'Da 99 €',ar:'من 99 €',ru:'От 99 €'},tags:{es:['5 tours','1–2 pers'],en:['5 tours','1–2 pax'],de:['5 Tours','1–2 Pers'],fr:['5 tours','1–2 pers'],it:['5 tour','1–2 pers'],ar:['5 جولات','1-2 أشخاص'],ru:['5 туров','1–2 чел']},desc:{es:'5 rutas disponibles desde 30 min hasta 2h. Transporte incluido. Reserva con tour específico.',en:'5 routes from 30 min to 2h. Transport included. Book your specific tour.',de:'5 Routen von 30 Min bis 2h. Transfer inklusive.',fr:'5 parcours de 30 min à 2h. Transport inclus.',it:'5 percorsi da 30 min a 2h. Trasporto incluso.',ar:'5 مسارات من 30 دقيقة إلى ساعتين. النقل مشمول.',ru:'5 маршрутов от 30 мин до 2ч. Трансфер включён.'},jetski:true},
      // ... (all other venue objects would be included here)
    ];
    
    const collections = [
      {id:'hidden-beaches',name:'Hidden Beaches',img:'https://res.cloudinary.com/dxhef6dju/image/upload/w_640,h_800,c_fill,q_auto,f_auto/v1774300401/36_slsjr4.png',eyebrow:{es:'Colección',en:'Collection',de:'Kollektion',fr:'Collection',it:'Collezione',ar:'مجموعة',ru:'Коллекция'},desc:{es:'Calas escondidas de agua cristalina.',en:'Crystal-clear hidden coves.',de:'Versteckte Buchten.',fr:'Criques cachées.',it:'Cale nascoste.',ar:'خلجان مخفية بمياه صافية.',ru:'Скрытые бухты.'},cta:{es:'Descubrir calas',en:'Discover coves',de:'Buchten entdecken',fr:'Découvrir',it:'Scopri le cale',ar:'اكتشف الخلجان',ru:'Открыть бухты'}},
      // ... (other collections)
    ];
    
    const partners = [
      {n:'MCP',img:'https://res.cloudinary.com/dxhef6dju/image/upload/w_120,h_120,c_fit,q_auto/v1774302013/44_ynjvv7.png'},
      {n:'Sea Moments',img:'https://res.cloudinary.com/dxhef6dju/image/upload/w_120,h_120,c_fit,q_auto/v1774302017/45_t8pli3.png'},
      // ... (other partners)
    ];
    
    const pricingData = [
      {title:{es:'Alquiler Barco (sin licencia)',en:'Boat Rental (no license)',de:'Bootsvermietung',fr:'Location Bateau',it:'Noleggio Barca',ar:'تأجير قارب',ru:'Аренда лодки'},sub:{es:'Ramón de Moncada 20, Santa Ponça · Max 5 pax · Dep. 200 €',en:'Ramón de Moncada 20, Santa Ponça · Max 5 pax · Dep. 200 €',de:'Ramón de Moncada 20, Santa Ponça · Max 5 · Anz. 200 €',fr:'Ramón de Moncada 20, Santa Ponça · Max 5 · Dép. 200 €',it:'Ramón de Moncada 20, Santa Ponça · Max 5 · Dep. 200 €',ar:'رامون دي مونكادا 20، سانتا بونسا · 5 أشخاص · وديعة 200 €',ru:'Рамон де Монкада 20, Санта Понса · Макс 5 · Залог 200 €'},rows:[['2h','130 €'],['3h','170 €'],['4h','200 €'],['5h','230 €'],['6h','260 €']],note:{es:'Incluye gasolina y snorkel. Sin licencia requerida.',en:'Gas & snorkel included. No license required.',de:'Benzin & Schnorchel inkl. Kein Schein nötig.',fr:'Essence & tuba inclus. Sans permis.',it:'Benzina e snorkel inclusi. Senza patente.',ar:'البنزين والغطس مشمولان. لا رخصة مطلوبة.',ru:'Бензин и снорклинг включены. Без лицензии.'}},
      // ... (other pricing items)
    ];
    
    // ===== HELPER FUNCTIONS =====
    function t(k){return L[k]?.[lang]||L[k]?.es||k}
    function loc(v){return typeof v==='object'?(v[lang]||v.es||''):v}
    function parsePrice(p){const s=typeof p==='object'?(p.es||''):String(p);const m=s.match(/(\d+)/);return m?parseInt(m[1]):0}
    
    function waLink(v){
      const dateLbl={es:'[fecha]',en:'[date]',de:'[Datum]',fr:'[date]',it:'[data]',ar:'[التاريخ]',ru:'[дата]'}[lang]||'[date]';
      let m = (v.wa && typeof v.wa === 'object') ? (v.wa[lang] || v.wa.en || v.wa.es || '') : (v.wa || '');
      m=m.replace('%n','2').replace('%d',dateLbl);
      return `https://wa.me/${WA}?text=${encodeURIComponent(m)}`;
    }
    
    // ===== RENDER FUNCTIONS =====
    function renderLangBtns(){
      document.getElementById('langGrp').innerHTML = LANGS.map(l => 
        `<button class="lang-btn${l===lang?' active':''}" data-lang="${l}" aria-pressed="${l===lang}">${l.toUpperCase()}</button>`
      ).join('');
      document.querySelectorAll('#langGrp .lang-btn').forEach(b => 
        b.addEventListener('click', () => setLang(b.dataset.lang))
      );
    }
    
    function renderCatBtns(){
      const cats = ['all','water','beach','mountain','night','culture','food','free'];
      document.getElementById('catInner').innerHTML = cats.map(c => 
        `<button class="cat-btn${c===cat?' active':''}" data-cat="${c}" role="tab" aria-selected="${c===cat}">${t('c_'+c)}</button>`
      ).join('');
      document.querySelectorAll('.cat-btn').forEach(b => 
        b.addEventListener('click', () => setCat(b.dataset.cat))
      );
    }
    
    function renderFeatured(){
      document.getElementById('featScroll').innerHTML = V.filter(v=>v.feat).map(v=>{
        let href, attrs='';
        if(v.jetski){href='javascript:openJetSki()'}
        else if(v.bcm){href=BCM_TICKET_URL;attrs='target="_blank" rel="noopener"'}
        else if(v.id==='boat-party'){href=BOAT_PARTY_URL;attrs='target="_blank" rel="noopener"'}
        else{href=waLink(v);attrs='target="_blank" rel="noopener"'}
        return `<a class="feat-card" href="${href}" ${attrs} role="listitem">
          <img src="${v.img}" alt="${loc(v.name)}" loading="lazy" width="320" height="427">
          <span class="feat-price">${loc(v.price)}</span>
          <div class="feat-info">
            <span class="feat-tag">${loc(v.bTxt)}</span>
            <h3>${loc(v.name)}</h3>
            <p>${loc(v.desc)}</p>
          </div>
        </a>`
      }).join('');
    }
    
    function renderVenues(){
      const g = document.getElementById('vGrid');
      const list = cat==='all' ? V : V.filter(v=>v.cat===cat);
      g.innerHTML = list.map((v,i)=>{
        let actions;
        if(v.bcm){
          actions = `<a class="v-wa" href="${BCM_TICKET_URL}" target="_blank" rel="noopener">${t('bcm_buy')}</a><a class="v-map" href="https://wa.me/${WA}?text=${encodeURIComponent('Hola, consulta sobre BCM VIP / mesas')}" target="_blank" rel="noopener" title="VIP" aria-label="VIP inquiry">VIP</a>`;
        }else if(v.id==='boat-party'){
          actions = `<a class="v-wa" href="${BOAT_PARTY_URL}" target="_blank" rel="noopener">${t('bcm_buy')}</a>`;
        }else if(v.jetski){
          actions = `<button class="v-wa" onclick="openJetSki()" type="button">${t('book')}</button>`;
        }else{
          const priceStr = loc(v.price);
          const isFree = typeof priceStr==='string' && (priceStr==='Free'||priceStr==='Gratis'||priceStr==='Kostenlos'||priceStr==='Gratuit'||priceStr==='مجاني'||priceStr==='Бесплатно');
          const ctaLabel = isFree ? t('v_info') : t('book');
          actions = `<a class="v-wa" href="${waLink(v)}" target="_blank" rel="noopener">${ctaLabel}</a>${v.map?`<a class="v-map" href="${v.map}" target="_blank" aria-label="View on map">↗</a>`:''}`;
        }
        return `<article class="v-card reveal" style="transition-delay:${i*30}ms" role="listitem">
          <div class="v-img">
            <img src="${v.img}" alt="${loc(v.name)}" loading="lazy" width="240" height="300">
            <div class="v-img-overlay"><p>${loc(v.desc)}</p></div>
            <span class="v-badge ${v.badge==='premium'?'b-premium':v.badge==='season'?'b-season':'b-open'}" aria-label="${loc(v.bTxt)}">${loc(v.bTxt)}</span>
          </div>
          <div class="v-body">
            <div class="v-top"><h3>${loc(v.name)}</h3><span class="v-pr">${loc(v.price)}</span></div>
            <div class="v-tags" aria-label="Tags">${(loc(v.tags)||[]).map(t=>`<span class="v-tag">${t}</span>`).join('')}</div>
            <p class="v-desc">${loc(v.desc)}</p>
            <div class="v-acts">${actions}</div>
          </div>
        </article>`
      }).join('');
      // Trigger reveal animations
      requestAnimationFrame(() => {
        g.querySelectorAll('.reveal').forEach((el,i) => {
          setTimeout(() => el.classList.add('active'), i * 40);
        });
      });
    }
    
    function renderCollections(){
      document.getElementById('colGrid').innerHTML = collections.map(c => `
        <a class="collection-card" href="https://wa.me/${WA}?text=${encodeURIComponent('Hola! Me interesa '+loc(c.name))}" target="_blank" rel="noopener" role="listitem">
          <img src="${c.img}" alt="${loc(c.name)}" loading="lazy" width="220" height="293">
          <div class="col-overlay"></div>
          <div class="col-info">
            <div class="col-eyebrow">${loc(c.eyebrow)}</div>
            <h3>${loc(c.name)}</h3>
            <p>${loc(c.desc)}</p>
            <span class="col-cta">${loc(c.cta)}</span>
          </div>
        </a>`).join('');
    }
    
    function renderPricing(){
      document.getElementById('pricingGrid').innerHTML = pricingData.map(p => 
        `<article class="p-card glass">
          <h4>${loc(p.title)}</h4>
          <div class="p-sub">${loc(p.sub)}</div>
          ${p.rows.map(r=>`<div class="p-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')}
          <div class="p-note">${loc(p.note)}</div>
        </article>`).join('')
    }
    
    function renderPartners(){
      document.getElementById('partnerRow').innerHTML = partners.map(p => 
        `<div class="p-logo" title="${p.n}" role="listitem">
          <img src="${p.img}" alt="${p.n}" width="48" height="48" loading="lazy">
        </div>`).join('')
    }
    
    function populateSelect(){
      document.getElementById('fA').innerHTML = V.filter(v=>!v.jetski).map(v => 
        `<option value="${v.id}">${loc(v.name)} — ${loc(v.price)}</option>`
      ).join('');
      renderCheckboxes();
    }
    
    function renderCheckboxes(){
      const items = V.filter(v=>!v.jetski);
      let html = items.map(v => 
        `<label class="cb-item${cart.includes(v.id)?' active':''}" tabindex="0" role="checkbox" aria-checked="${cart.includes(v.id)}" onclick="toggleCb('${v.id}')" onkeypress="if(event.key==='Enter'||event.key===' ')toggleCb('${v.id}')">
          <span class="cb-ck">✓</span>
          <span class="cb-lb">${loc(v.name)}<small>${loc(v.price)}</small></span>
        </label>`
      ).join('');
      html += jetSkiTours.map(tr => 
        `<label class="cb-item${cart.includes('js-'+tr.id)?' active':''}" tabindex="0" role="checkbox" aria-checked="${cart.includes('js-'+tr.id)}" onclick="toggleCb('js-${tr.id}')" onkeypress="if(event.key==='Enter'||event.key===' ')toggleCb('js-${tr.id}')">
          <span class="cb-ck">✓</span>
          <span class="cb-lb">${tr.name}<small>${tr.price} € · ${tr.dur}</small></span>
        </label>`
      ).join('');
      document.getElementById('cbGrid').innerHTML = html;
      updateTotal();
    }
    
    function toggleCb(vid){
      const i = cart.indexOf(vid);
      if(i > -1) cart.splice(i,1); else cart.push(vid);
      renderCheckboxes();
    }
    
    function updateTotal(){
      const el = document.getElementById('cartTotal'), amt = document.getElementById('totalAmt');
      if(!cart.length){el.style.display='none';return}
      el.style.display = 'flex';
      let sum = 0, tbc = false;
      cart.forEach(vid => {
        if(vid.startsWith('js-')){
          const tr = jetSkiTours.find(t=>t.id===vid.slice(3));
          if(tr) sum += tr.price;
        } else {
          const v = V.find(x=>x.id===vid);
          if(v){
            if(v.bcm){sum+=35}
            else if(v.id==='boat-party'){sum+=69}
            else{
              const n = parsePrice(v.price);
              if(n>0) sum+=n; else tbc=true;
            }
          }
        }
      });
      amt.textContent = sum>0 ? (tbc ? sum+' € +' : sum+' €') : t('qf_tbc');
    }
    
    function applyI18n(){
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        const v = t(k);
        if(v) el.innerHTML = v;
      });
    }
    
    // ===== MODAL FUNCTIONS =====
    function openJetSki(){
      document.getElementById('jsModal').classList.add('active');
      renderJsTours();
      // Focus management
      setTimeout(() => document.getElementById('jsName')?.focus(), 100);
    }
    
    function renderJsTours(){
      document.getElementById('jsTours').innerHTML = jetSkiTours.map(tr => `
        <div class="jf-tour${tr.id===selTour?' active':''}" 
             onclick="selTour='${tr.id}';renderJsTours()"
             role="radio" 
             aria-checked="${tr.id===selTour}"
             tabindex="0"
             onkeypress="if(event.key==='Enter'||event.key===' '){selTour='${tr.id}';renderJsTours()}">
          <span class="jf-radio"></span>
          <div class="jf-tinfo">
            <div class="jf-tname">${tr.name}</div>
            <div class="jf-tmeta">${tr.dur}</div>
          </div>
          <span class="jf-tprice">${tr.price} €</span>
        </div>`).join('');
    }
    
    function submitJetSki(e){
      e.preventDefault();
      const name = document.getElementById('jsName').value,
            phone = document.getElementById('jsPhone').value,
            pax = document.getElementById('jsPax').value,
            skis = document.getElementById('jsSkis').value,
            pickup = document.getElementById('jsPickup').value,
            time = document.getElementById('jsTime').value,
            notes = document.getElementById('jsNotes').value;
      const tour = jetSkiTours.find(t=>t.id===selTour);
      if(!name||!phone||!pickup||!time||!tour) return;
      
      let m = `${name}\n${phone}\n${pax} pax\n${skis} jet skis\n${tour.name}\n\nTransport desde:\n${pickup}\n${time}`;
      if(notes) m += `\n${notes}`;
      
      showToast(t('toast'));
      setTimeout(() => {
        window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank');
        closeModal('jsModal');
      }, 400);
    }
    
    function openModal(vid){
      document.getElementById('bkModal').classList.add('active');
      if(vid) document.getElementById('fA').value = vid;
      setTimeout(() => document.getElementById('fN')?.focus(), 100);
    }
    
    function closeModal(id){
      document.getElementById(id||'bkModal').classList.remove('active');
    }
    
    function submitBooking(e){
      e.preventDefault();
      const n = document.getElementById('fN').value,
            v = V.find(x=>x.id===document.getElementById('fA').value);
      if(!v) return;
      
      if(v.bcm){window.open(BCM_TICKET_URL,'_blank');closeModal('bkModal');return}
      if(v.id==='boat-party'){window.open(BOAT_PARTY_URL,'_blank');closeModal('bkModal');return}
      if(v.jetski){openJetSki();closeModal('bkModal');return}
      
      const d = document.getElementById('fD').value,
            p = document.getElementById('fP').value,
            notes = document.getElementById('fNo').value;
      if(!d){alert('Please select a date');return}
      
      let m = `RESERVA MallorcasLocal\n\nNombre: ${n}\nActividad: ${loc(v.name)}\nFecha: ${d}\nPersonas: ${p}`;
      if(notes) m += `\nNotas: ${notes}`;
      m += '\n\nConfirmais disponibilidad?';
      
      showToast(t('toast'));
      setTimeout(() => {
        window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank');
        closeModal('bkModal');
      }, 400);
    }
    
    // ===== QUICK FORM =====
    function submitQuick(e){
      e.preventDefault();
      const n = document.getElementById('qN').value;
      if(!n||!cart.length) return;
      
      const d = document.getElementById('qD').value,
            p = document.getElementById('qP').value,
            notes = document.getElementById('qNo').value;
      if(!d){alert('Please select a date');return}
      
      const directLinks = cart.filter(vid=>vid==='bcm'||vid==='boat-party');
      if(directLinks.length===1 && cart.length===1){
        window.open(directLinks[0]==='bcm'?BCM_TICKET_URL:BOAT_PARTY_URL,'_blank');
        return;
      }
      
      let items = cart.map(vid => {
        if(vid.startsWith('js-')){
          const tr = jetSkiTours.find(t=>t.id===vid.slice(3));
          return tr ? `- Jet Ski: ${tr.name}` : '';
        }
        const v = V.find(x=>x.id===vid);
        return v ? `- ${loc(v.name)}` : '';
      }).filter(Boolean).join('\n');
      
      let sum = cart.reduce((a,vid) => {
        if(vid.startsWith('js-')){
          const tr = jetSkiTours.find(t=>t.id===vid.slice(3));
          return a + (tr?tr.price:0);
        }
        const v = V.find(x=>x.id===vid);
        if(!v) return a;
        if(v.bcm) return a+35;
        if(v.id==='boat-party') return a+69;
        return a + parsePrice(v.price);
      }, 0);
      
      let m = `RESERVA MallorcasLocal\n\nNombre: ${n}\nFecha: ${d}\nPersonas: ${p}\n\nExperiencias:\n${items}\n\nTotal estimado: ${sum>0?sum+' €':'A confirmar'}`;
      if(notes) m += `\nNotas: ${notes}`;
      if(directLinks.length){
        m += `\n\nImportante:\n- BCM ticket: ${directLinks.includes('bcm')?'Sí':'No'}\n- Boat Party deposit: ${directLinks.includes('boat-party')?'Sí':'No'}`;
      }
      m += '\n\nConfirmais disponibilidad?';
      
      showToast(t('toast'));
      setTimeout(() => window.open(`https://wa.me/${WA}?text=${encodeURIComponent(m)}`,'_blank'), 400);
    }
    
    function showToast(msg){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 2200);
    }
    
    // ===== THEME & LANG =====
    function setLang(l){
      lang = l;
      const isRtl = RTL_LANGS.includes(l);
      document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
      document.documentElement.lang = l;
      
      // Update theme color meta tag
      const themeColor = document.querySelector('meta[name="theme-color"]');
      if(themeColor){
        themeColor.setAttribute('content', document.body.dataset.theme==='light' ? '#f7f6f2' : '#050505');
      }
      
      renderLangBtns();
      renderCatBtns();
      applyI18n();
      renderFeatured();
      renderVenues();
      renderCollections();
      renderPricing();
      populateSelect();
    }
    
    function setCat(c){
      cat = c;
      renderCatBtns();
      renderVenues();
    }
    
    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      // Theme toggle
      const themeBtn = document.getElementById('themeBtn');
      const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = savedTheme;
      themeBtn?.addEventListener('click', () => {
        const newTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = newTheme;
        localStorage.setItem('theme', newTheme);
      });
      
      // Header scroll effect
      const topbar = document.querySelector('.topbar');
      const onScroll = () => {
        if(window.scrollY > 10) topbar?.classList.add('scrolled');
        else topbar?.classList.remove('scrolled');
      };
      window.addEventListener('scroll', onScroll, {passive:true});
      onScroll();
      
      // Reveal on scroll
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add('active');
            observer.unobserve(entry.target);
          }
        });
      }, {threshold: 0.1, rootMargin: '0px 0px -50px 0px'});
      
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      }, 200);
      
      // Modal close on backdrop click
      ['bkModal','jsModal'].forEach(id => {
        const modal = document.getElementById(id);
        modal?.addEventListener('click', (e) => {
          if(e.target === modal) closeModal(id);
        });
      });
      
      // Keyboard navigation for modals
      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape'){
          closeModal('bkModal');
          closeModal('jsModal');
        }
      });
      
      // Form date min
      const today = new Date().toISOString().split('T')[0];
      ['fD','qD'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.min = today;
      });
      
      // Initialize
      setLang('en');
      renderPartners();
    });
  </script>
