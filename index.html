<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<meta name="description" content="Book boats, jet skis & luxury experiences in Mallorca. Direct booking via WhatsApp — no fees, no middlemen.">
<title>MallorcasLocal — Book Mallorca like a local</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--bg2:#111;--bg3:#191919;--card:#0e0e0e;--card2:#141414;--line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.09);--line3:rgba(255,255,255,.14);--text:#eee;--text2:rgba(255,255,255,.48);--text3:rgba(255,255,255,.24);--gold:#c9a96e;--gold2:#d9bc82;--golddim:rgba(201,169,110,.12);--goldglow:rgba(201,169,110,.28);--wa:#25d366;--ff:'DM Sans',sans-serif;--fs:'Playfair Display',serif;--ease:.25s cubic-bezier(.4,0,.2,1);--ease2:.4s cubic-bezier(.22,1,.36,1);--r:12px;--r2:16px;--r3:24px;--rmax:999px;--btn-text:#0a0a0a;--shadow-md:0 10px 32px rgba(0,0,0,.3);--shadow-lg:0 20px 60px rgba(0,0,0,.4);--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:var(--ff);cursor:pointer;border:none;background:none;color:var(--text)}
img{display:block;max-width:100%}
::selection{background:var(--gold);color:#000}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.28;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;background:rgba(5,5,5,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(14px,4vw,32px);transition:background var(--ease)}
.tb-logo{font-family:var(--fs);font-size:18px;font-weight:600;letter-spacing:-.02em;white-space:nowrap;cursor:pointer}
.tb-logo span{color:var(--gold);font-style:italic}
.tb-r{display:flex;align-items:center;gap:2px}
.nav-link{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text2);transition:all var(--ease);cursor:pointer;white-space:nowrap}
.nav-link:hover,.nav-link.on{color:var(--gold);background:var(--golddim)}
.lang-grp{display:flex;gap:2px;margin-left:6px}
.lb{padding:4px 7px;border-radius:6px;font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);transition:all var(--ease);min-width:26px}
.lb:hover{color:var(--text2);background:var(--line)}
.lb.on{color:var(--gold);background:var(--golddim)}
@media(max-width:520px){.lb{padding:3px 5px;font-size:9px;min-width:22px}.nav-link{padding:5px 8px;font-size:10px}}

/* PAGES */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* HERO */
.hero{position:relative;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:76px clamp(16px,4vw,40px) clamp(40px,8vh,80px);overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.38;filter:saturate(.65)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(5,5,5,.55) 40%,rgba(5,5,5,.15) 70%,rgba(5,5,5,.45) 100%)}
.hero-content{position:relative;z-index:1;max-width:740px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:22px;padding:6px 14px;border-radius:var(--rmax);border:1px solid var(--line2);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);backdrop-filter:blur(8px);background:rgba(0,0,0,.15)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--golddim);animation:glow 2.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px var(--golddim)}50%{box-shadow:0 0 0 8px transparent}}
.hero h1{font-family:var(--fs);font-size:clamp(38px,6.8vw,78px);font-weight:500;letter-spacing:-.03em;line-height:1.02;margin-bottom:22px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-p{font-size:clamp(14px,1.55vw,16.5px);color:var(--text2);max-width:540px;margin-bottom:36px;line-height:1.65}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--rmax);background:var(--gold);color:var(--btn-text);font-weight:600;font-size:13px;letter-spacing:.02em;transition:all var(--ease);white-space:nowrap;border:none;cursor:pointer;font-family:var(--ff)}
.btn-gold:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 28px var(--goldglow)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--rmax);background:rgba(255,255,255,.03);color:var(--text);font-weight:600;font-size:13px;border:1px solid var(--line2);transition:all var(--ease);white-space:nowrap;backdrop-filter:blur(10px)}
.btn-ghost:hover{border-color:var(--line3);background:rgba(255,255,255,.06);transform:translateY(-1px)}

/* TRUST */
.trust{display:flex;justify-content:center;gap:clamp(20px,5vw,60px);padding:28px clamp(16px,4vw,40px);border-bottom:1px solid var(--line)}
.trust-item{text-align:center}
.trust-item strong{display:block;font-family:var(--fs);font-size:clamp(24px,3vw,36px);font-weight:500;letter-spacing:-.02em;color:var(--gold);line-height:1}
.trust-item span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-top:6px;display:block}

/* SECTION TITLES */
.sec-hd{max-width:1200px;margin:0 auto;padding:clamp(40px,5vh,72px) clamp(16px,4vw,40px) 22px}
.sec-hd h2{font-family:var(--fs);font-size:clamp(26px,3.2vw,42px);font-weight:500;letter-spacing:-.02em;line-height:1.1}
.sec-hd h2 em{font-style:italic;color:var(--gold)}
.sec-hd p{font-size:13.5px;color:var(--text2);margin-top:8px;max-width:460px;line-height:1.55}

/* HORIZONTAL SCROLL STRIP */
.h-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:0 clamp(16px,4vw,40px) 16px;scroll-snap-type:x mandatory;scroll-padding-left:clamp(16px,4vw,40px)}
.h-scroll::-webkit-scrollbar{display:none}
.h-card{flex:0 0 clamp(240px,32vw,320px);scroll-snap-align:start;border-radius:var(--r2);overflow:hidden;position:relative;aspect-ratio:3/4;cursor:pointer;display:block}
.h-card img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease2)}
.h-card:hover img{transform:scale(1.06)}
.h-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 50%,rgba(0,0,0,.05) 100%);pointer-events:none}
.h-card-info{position:absolute;bottom:0;left:0;right:0;z-index:1;padding:18px}
.h-card-tag{display:inline-block;padding:4px 10px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(201,169,110,.2);color:var(--gold);border:1px solid rgba(201,169,110,.28);margin-bottom:8px;backdrop-filter:blur(8px)}
.h-card-info h3{font-family:var(--fs);font-size:20px;font-weight:500;margin-bottom:4px;color:#fff}
.h-card-info .sub{font-size:11px;color:rgba(255,255,255,.68);letter-spacing:.04em;font-weight:500}
.h-card-price{position:absolute;top:12px;right:12px;z-index:1;padding:5px 11px;border-radius:var(--rmax);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);font-size:11.5px;font-weight:700;color:var(--gold)}

/* COLLECTION GRID */
.col-grid{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.col-card{position:relative;border-radius:var(--r2);overflow:hidden;aspect-ratio:3/4;cursor:pointer;transition:all var(--ease);display:block}
.col-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.col-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease2)}
.col-card:hover img{transform:scale(1.05)}
.col-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 60%,transparent 100%);z-index:1}
.col-card .info{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:18px}
.col-card .eyebrow{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.col-card .info h3{font-family:var(--fs);font-size:19px;font-weight:500;color:#fff;margin-bottom:4px}
.col-card .info p{font-size:11px;color:rgba(255,255,255,.62);line-height:1.4}
.col-cta{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.02em;transition:gap var(--ease)}
.col-card:hover .col-cta{gap:10px}

/* LIFESTYLE SECTION */
.lifestyle{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.lifestyle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-radius:var(--r2);overflow:hidden}
.lifestyle-grid img{width:100%;aspect-ratio:1;object-fit:cover;transition:transform .5s var(--ease2)}
.lifestyle-grid img:hover{transform:scale(1.05)}
@media(max-width:640px){.lifestyle-grid{grid-template-columns:repeat(2,1fr)}}

/* BOOK PAGE */
.book-hero{padding:80px clamp(16px,4vw,40px) 32px;max-width:1200px;margin:0 auto}
.book-hero h1{font-family:var(--fs);font-size:clamp(28px,4vw,48px);font-weight:500;letter-spacing:-.02em;margin-bottom:8px}
.book-hero h1 em{color:var(--gold);font-style:italic}
.book-hero p{color:var(--text2);font-size:14px;max-width:520px}
.book-section{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 40px}
.book-section h2{font-family:var(--fs);font-size:clamp(22px,2.5vw,32px);font-weight:500;margin-bottom:6px;letter-spacing:-.01em}
.book-section h2 em{color:var(--gold);font-style:italic}
.book-section>.sub{font-size:12.5px;color:var(--text2);margin-bottom:20px}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
@media(max-width:640px){.book-grid{grid-template-columns:1fr}}

/* PRODUCT CARD */
.p-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;transition:all var(--ease);display:flex;flex-direction:column}
.p-card:hover{border-color:var(--line3);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.p-card .p-img{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--bg2)}
.p-card .p-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease2)}
.p-card:hover .p-img img{transform:scale(1.05)}
.p-card .p-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(8px);z-index:2;background:rgba(201,169,110,.25);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.p-card .p-badge.premium{background:rgba(201,169,110,.4);color:#fff}
.p-card .p-price-tag{position:absolute;top:10px;right:10px;padding:5px 11px;border-radius:var(--rmax);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);font-size:11.5px;font-weight:700;color:var(--gold);z-index:2}
.p-card .p-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
.p-card .p-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.p-card .p-top h3{font-size:15px;font-weight:700;letter-spacing:-.01em;flex:1;line-height:1.25}
.p-card .p-loc{font-size:10.5px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:4px}
.p-card .p-loc::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--text3)}
.p-card .p-desc{font-size:11.5px;color:var(--text2);line-height:1.5;flex:1}
.p-card .p-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.p-card .p-tag{font-size:9px;color:var(--text2);padding:3px 8px;border-radius:var(--rmax);background:rgba(255,255,255,.04);border:1px solid var(--line)}
.p-card .p-actions{display:flex;gap:6px;margin-top:auto;padding-top:10px}
.p-card .p-wa{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:10px;font-size:12px;font-weight:700;background:var(--gold);color:var(--btn-text);transition:all var(--ease);letter-spacing:.02em;border:none;cursor:pointer;font-family:var(--ff)}
.p-card .p-wa:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 14px var(--goldglow)}
.p-card .p-wa svg{width:14px;height:14px;fill:currentColor}

/* PRICING TABLE */
.pricing-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.pr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.pr-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;transition:all var(--ease)}
.pr-card:hover{border-color:rgba(201,169,110,.25);transform:translateY(-2px)}
.pr-card h4{font-family:var(--fs);font-size:18px;font-weight:500;margin-bottom:4px}
.pr-card .pr-sub{font-size:11.5px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.pr-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.pr-row:last-of-type{border:none}
.pr-row span:last-child{font-weight:700;color:var(--gold)}
.pr-note{font-size:10.5px;color:var(--text3);margin-top:10px;line-height:1.55;padding-top:8px;border-top:1px dashed var(--line)}

/* FINAL CTA BANNER */
.final-cta{max-width:1200px;margin:0 auto;padding:clamp(40px,6vh,80px) clamp(16px,4vw,40px);text-align:center}
.final-cta-inner{background:var(--card);border:1px solid var(--line2);border-radius:var(--r3);padding:clamp(32px,5vw,56px);position:relative;overflow:hidden}
.final-cta-inner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,169,110,.08) 0%,transparent 70%);pointer-events:none}
.final-cta h2{font-family:var(--fs);font-size:clamp(24px,3vw,38px);font-weight:500;margin-bottom:10px;position:relative}
.final-cta h2 em{color:var(--gold);font-style:italic}
.final-cta p{color:var(--text2);font-size:14px;max-width:420px;margin:0 auto 24px;position:relative}
.final-cta .btn-gold{font-size:15px;padding:16px 36px;position:relative}

/* FAQS */
.faq-hero{padding:80px clamp(16px,4vw,40px) 24px;max-width:900px;margin:0 auto}
.faq-hero h1{font-family:var(--fs);font-size:clamp(28px,4vw,44px);font-weight:500;margin-bottom:8px}
.faq-hero h1 em{color:var(--gold);font-style:italic}
.faq-hero p{color:var(--text2);font-size:14px}
.faq-section{max-width:900px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 32px}
.faq-cat{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-top:24px;border-top:1px solid var(--line)}
.faq-item{border-bottom:1px solid var(--line);overflow:hidden}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:14px 0;cursor:pointer;font-size:14px;font-weight:600;gap:12px;transition:color var(--ease)}
.faq-q:hover{color:var(--gold)}
.faq-q .arrow{transition:transform var(--ease);font-size:12px;color:var(--text3);flex-shrink:0}
.faq-item.open .faq-q .arrow{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s var(--ease2),padding .35s var(--ease2)}
.faq-item.open .faq-a{max-height:300px;padding-bottom:14px}
.faq-a p{font-size:13px;color:var(--text2);line-height:1.6}

/* PARTNERS */
.partners{padding:44px clamp(16px,4vw,40px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.partners h3{text-align:center;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);margin-bottom:22px}
.partner-row{display:flex;justify-content:center;flex-wrap:wrap;gap:18px}
.p-logo{width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all var(--ease)}
.p-logo:hover{border-color:rgba(201,169,110,.35);transform:scale(1.08)}
.p-logo img{width:52px;height:52px;object-fit:contain;filter:brightness(1.4) contrast(1.1)}

/* FOOTER */
.footer{border-top:1px solid var(--line);padding:28px clamp(16px,4vw,40px) calc(28px + var(--safe-bottom));text-align:center}
.footer p{font-size:11px;color:var(--text3);line-height:1.6}
.footer a{color:var(--gold);transition:color var(--ease)}

/* WA FAB */
.wa-fab{position:fixed;bottom:calc(18px + var(--safe-bottom));right:18px;z-index:850;width:54px;height:54px;border-radius:50%;background:var(--wa);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,211,102,.35);transition:all var(--ease);cursor:pointer}
.wa-fab:hover{transform:scale(1.08)}
.wa-fab svg{width:24px;height:24px;fill:#fff}

/* BRAND LOGO BAR */
.brand-bar{max-width:1200px;margin:0 auto;padding:32px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:center}
.brand-bar img{height:48px;opacity:.7;transition:opacity var(--ease)}
.brand-bar img:hover{opacity:1}

/* REVEAL */
.rv{opacity:0;transform:translateY(14px);transition:opacity .55s var(--ease2),transform .55s var(--ease2)}
.rv.vis{opacity:1;transform:none}

/* MODAL (JET SKI) */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .25s ease}
.modal-bg.show{display:flex;opacity:1}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r3);width:100%;max-width:440px;padding:26px;position:relative;max-height:90vh;overflow-y:auto;transform:translateY(12px) scale(.97);opacity:0;transition:all .3s var(--ease2);box-shadow:var(--shadow-lg)}
.modal-bg.show .modal{transform:none;opacity:1}
.modal h3{font-family:var(--fs);font-size:22px;font-weight:500;margin-bottom:4px;padding-right:32px}
.modal h3 em{color:var(--gold);font-style:italic}
.modal .ms{font-size:12.5px;color:var(--text2);margin-bottom:18px;line-height:1.55}
.mx{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);cursor:pointer;transition:all var(--ease);z-index:2;border:none}
.mx:hover{background:var(--line2);color:var(--text);transform:rotate(90deg)}
.fi{margin-bottom:11px}
.fi label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.fi input,.fi textarea,.fi select{width:100%;padding:11px 13px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--text);font-family:var(--ff);font-size:13.5px;outline:none;transition:all var(--ease)}
.fi input:focus,.fi textarea:focus{border-color:var(--gold);background:rgba(255,255,255,.06)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jf-tours{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.jf-tour{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--line2);cursor:pointer;transition:all var(--ease)}
.jf-tour:hover{border-color:var(--line3);background:rgba(255,255,255,.05)}
.jf-tour.sel{background:var(--golddim);border-color:rgba(201,169,110,.4)}
.jf-radio{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--ease)}
.jf-tour.sel .jf-radio{border-color:var(--gold)}
.jf-tour.sel .jf-radio::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--gold)}
.jf-tinfo{flex:1;min-width:0}
.jf-tname{font-size:12.5px;font-weight:600;line-height:1.3}
.jf-tmeta{font-size:10.5px;color:var(--text2);margin-top:2px}
.jf-tprice{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}
.f-submit{width:100%;padding:13px;border-radius:var(--r);margin-top:12px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--ease);border:none;cursor:pointer;font-family:var(--ff);letter-spacing:.02em;background:var(--gold);color:var(--btn-text)}
.f-submit:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 20px var(--goldglow)}

/* TOAST */
.toast-wrap{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:1100;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{padding:10px 22px;border-radius:var(--rmax);background:var(--card2);color:var(--text);font-size:12.5px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s var(--ease2);box-shadow:var(--shadow-md);border:1px solid var(--line3);white-space:nowrap}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--wa);color:#fff;border-color:var(--wa)}

/* RESPONSIVE */
@media(max-width:768px){.hero h1{margin-bottom:18px}.trust{flex-wrap:wrap;gap:14px 22px;padding:20px 16px}.h-card{flex:0 0 72vw}}
@media(max-width:480px){.h-card{flex:0 0 86vw}.hero-ctas{flex-direction:column;gap:10px;width:100%}.hero-ctas a,.hero-ctas button{width:100%;justify-content:center}.fi-row{grid-template-columns:1fr}.col-grid{grid-template-columns:1fr 1fr}}
@media(max-width:400px){.col-grid{grid-template-columns:1fr}}

/* GALLERY THUMBS ON CARDS */
.p-gallery{display:flex;gap:4px;padding:4px 0 0;overflow-x:auto;scrollbar-width:none}
.p-gallery::-webkit-scrollbar{display:none}
.p-gallery-thumb{width:44px;height:44px;border-radius:6px;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all var(--ease);opacity:.6}
.p-gallery-thumb:hover,.p-gallery-thumb.active{opacity:1;border-color:var(--gold)}
.p-gallery-thumb img{width:100%;height:100%;object-fit:cover}

/* VISUAL GALLERY (MASONRY-LIKE) */
.vis-gallery{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}
.vis-gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-radius:var(--r2);overflow:hidden}
.vis-gallery-grid img{width:100%;aspect-ratio:1;object-fit:cover;transition:transform .5s var(--ease2);cursor:pointer}
.vis-gallery-grid img:hover{transform:scale(1.06)}
.vis-gallery-grid img:first-child{grid-column:span 2;grid-row:span 2;aspect-ratio:1}
@media(max-width:640px){.vis-gallery-grid{grid-template-columns:repeat(2,1fr)}.vis-gallery-grid img:first-child{grid-column:span 2;aspect-ratio:16/9;grid-row:span 1}}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.show{display:flex}

.lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all var(--ease);z-index:2001}
.lightbox-close:hover{background:rgba(255,255,255,.2);transform:rotate(90deg)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all var(--ease)}
.lightbox-nav:hover{background:rgba(255,255,255,.2)}
.lightbox-prev{left:16px}
.lightbox-next{right:16px}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--text2);letter-spacing:.08em}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}.rv{opacity:1;transform:none}}

  js_tour_lbl:{es:'Elige tour',en:'Pick tour',de:'Tour wählen',fr:'Choisir tour'},
  js_skis:{es:'Nº Jet Skis',en:'# Jet Skis',de:'Anz. Jet Skis',fr:'Nb Jet Skis'},
  js_pickup:{es:'Hotel o punto de recogida',en:'Hotel or pickup point',de:'Hotel oder Abholort',fr:'Hôtel ou point de ramassage'},
  js_send:{es:'Reservar por WhatsApp',en:'Book via WhatsApp',de:'Per WhatsApp buchen',fr:'Réserver par WhatsApp'},
  js_modal_sub:{es:'Elige tu tour, rellena y reservamos al instante',en:'Pick your tour, fill in details and we\'ll book instantly',de:'Tour wählen, ausfüllen und sofort buchen',fr:'Choisissez votre tour, remplissez et on réserve'}
};

function t(k){return(L[k]&&(L[k][lang]||L[k].en))||k}
function loc(v){return(v&&typeof v==='object')?(v[lang]||v.en||v.es||''):(v||'')}

/* ===== NAVIGATION ===== */
function nav(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(n=>n.classList.toggle('on',n.dataset.page===page));
  window.scrollTo(0,0);
  if(page==='book')renderBookPage();
  if(page==='faqs')renderFaqs();
  initReveals();
}

/* ===== WHATSAPP LINK ===== */
function waLink(name,extra){
  const msgs={
    es:`Hola! Me interesa ${name}. ¿Me dais info y disponibilidad?${extra?' '+extra:''}`,
    en:`Hi! I'm interested in ${name}. Can you send info and availability?${extra?' '+extra:''}`,
    de:`Hallo! Ich interessiere mich für ${name}. Infos und Verfügbarkeit?${extra?' '+extra:''}`,
    fr:`Bonjour! Intéressé par ${name}. Infos et disponibilité ?${extra?' '+extra:''}`
  };
  return`https://wa.me/${WA}?text=${encodeURIComponent(msgs[lang]||msgs.en)}`;
}

const waSvg='<svg viewBox="0 0 24 24"><path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97s-.47-.15-.67.15-.77.97-.94 1.16-.35.22-.64.07c-.3-.15-1.26-.46-2.39-1.47-.88-.79-1.48-1.76-1.65-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.44-.52.15-.17.2-.3.3-.5s.05-.37-.03-.52c-.07-.15-.67-1.61-.92-2.21-.24-.58-.49-.5-.67-.51H8c-.2 0-.52.07-.79.37S6.17 8.82 6.17 10.28s1.07 2.88 1.21 3.07 2.1 3.2 5.08 4.49c.71.3 1.26.49 1.7.62.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2-1.41.25-.7.25-1.29.18-1.41-.08-.12-.27-.2-.57-.35zM12 0C5.37 0 0 5.37 0 12c0 2.62.85 5.06 2.28 7.03L.79 23.5l4.62-1.46A11.95 11.95 0 0012 24c6.63 0 12-5.37 12-12S18.63 0 12 0z"/></svg>';

/* ===== TOAST ===== */
function toast(msg,ok){
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast'+(ok?' ok':'');
  el.textContent=msg;
  w.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400)},2400);
}

/* ===== RENDER: HOME ===== */
function renderHome(){
  // Jet Ski strip
  document.getElementById('jsStrip').innerHTML=jetskiCards.map((js,i)=>`
    <a class="h-card" href="javascript:void(0)" onclick="openJetSki()">
      <img src="${js.img}" alt="Jet Ski Tour ${i+1}" loading="lazy">
      <span class="h-card-price">${lang==='es'?'Desde 99 €':lang==='de'?'Ab 99 €':lang==='fr'?'Dès 99 €':'From 99 €'}</span>
      <div class="h-card-info"><span class="h-card-tag">Jet Ski</span><h3>${jetSkiTours[i]?jetSkiTours[i].name:'Tour '+(i+1)}</h3><div class="sub">Santa Ponça · ${jetSkiTours[i]?jetSkiTours[i].dur:''}</div></div>
    </a>`).join('');

  // Collections
  document.getElementById('colGrid').innerHTML=homeCollections.map(c=>`
    <a class="col-card rv" href="javascript:void(0)" onclick="nav('book')">
      <img src="${c.img}" alt="${loc(c.name)}" loading="lazy">
      <div class="overlay"></div>
      <div class="info"><div class="eyebrow">${loc(c.eyebrow)}</div><h3>${loc(c.name)}</h3><p>${loc(c.desc)}</p><div class="col-cta">Explore →</div></div>
    </a>`).join('');

  // Lifestyle
  document.getElementById('lifeGrid').innerHTML=lifestyleImgs.map(img=>`<img src="${img}" alt="Lifestyle" loading="lazy">`).join('');

  // Visual Gallery (beaches + sunsets)
  document.getElementById('visGallery').innerHTML=galleryPool.map((img,i)=>`<img src="${img.replace('/upload/','/upload/w_600,h_600,c_fill,q_auto,f_auto/')}" alt="Mallorca" loading="lazy" onclick="openLightbox(galleryPool,${i})">`).join('');

  // Partners
  document.getElementById('partnerRow').innerHTML=partners.map(p=>`<div class="p-logo" title="${p.n}"><img src="${p.img}" alt="${p.n}" loading="lazy"></div>`).join('');
}

/* ===== RENDER: BOOK ===== */
function renderBookPage(){
  // Charters with image galleries
  document.getElementById('charterGrid').innerHTML=charters.map(c=>{
    const gallery=c.gallery||[c.img];
    const thumbs=gallery.length>1?`<div class="p-gallery">${gallery.map((g,i)=>`<div class="p-gallery-thumb${i===0?' active':''}" onclick="swapCardImg(this,'${g.replace(/'/g,"\\'")}')"><img src="${toThumb(g)}" alt="${c.name}" loading="lazy"></div>`).join('')}</div>`:'';
    return `<article class="p-card rv">
      <div class="p-img" onclick="openLightbox(${JSON.stringify(gallery).replace(/"/g,'&quot;')},0)">
        <img src="${c.img}" alt="${c.name}" loading="lazy" data-main-img>
        <span class="p-badge${c.premium?' premium':''}">${c.badge}</span>
        <span class="p-price-tag">${loc(c.price)}</span>
      </div>
      <div class="p-body">
        ${thumbs}
        <div class="p-top"><h3>${c.name}</h3></div>
        <div class="p-loc">${c.loc}</div>
        <div class="p-desc">${loc(c.desc)}</div>
        <div class="p-tags">${c.tags.map(tg=>`<span class="p-tag">${tg}</span>`).join('')}</div>
        <div class="p-actions">
          <a class="p-wa" href="${waLink(c.name)}" target="_blank" rel="noopener">${waSvg} ${t('book_wa')}</a>
        </div>
      </div>
    </article>`;
  }).join('');

  // Pricing
  document.getElementById('prGrid').innerHTML=pricingData.map(p=>`
    <div class="pr-card rv"><h4>${loc(p.title)}</h4><div class="pr-sub">${loc(p.sub)}</div>
    ${p.rows.map(r=>`<div class="pr-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')}
    <div class="pr-note">${loc(p.note)}</div></div>`).join('');

  // Jet Ski grid — each tour gets a unique image from jetskiCards
  const jsGrid=jetSkiTours.map((tr,idx)=>`
    <article class="p-card rv">
      <div class="p-img" onclick="openLightbox(${JSON.stringify(jetskiCards.map(j=>j.img)).replace(/"/g,'&quot;')},${idx})">
        <img src="${jetskiCards[idx%jetskiCards.length].img}" alt="${tr.name}" loading="lazy">
        <span class="p-badge">Jet Ski</span>
        <span class="p-price-tag">${tr.price} €</span>
      </div>
      <div class="p-body">
        <div class="p-top"><h3>${tr.name}</h3></div>
        <div class="p-loc">Santa Ponça</div>
        <div class="p-desc">${tr.dur} · 1–2 pax · ${lang==='es'?'Transporte incluido':lang==='de'?'Transfer inkl.':lang==='fr'?'Transport inclus':'Transport included'}</div>
        <div class="p-tags"><span class="p-tag">${tr.dur}</span><span class="p-tag">1–2 pax</span></div>
        <div class="p-actions">
          <button class="p-wa" onclick="openJetSki()">${waSvg} ${t('js_book')}</button>
        </div>
      </div>
    </article>`).join('');
  document.getElementById('jetskiGrid').innerHTML=jsGrid;

  // Experiences with galleries
  document.getElementById('expGrid').innerHTML=experiences.map(e=>{
    const gallery=e.gallery||[e.img];
    const thumbs=gallery.length>1?`<div class="p-gallery">${gallery.map((g,i)=>`<div class="p-gallery-thumb${i===0?' active':''}" onclick="swapCardImg(this,'${g.replace(/'/g,"\\'")}')"><img src="${toThumb(g)}" alt="${e.name}" loading="lazy"></div>`).join('')}</div>`:'';
    return `<article class="p-card rv">
      <div class="p-img" onclick="openLightbox(${JSON.stringify(gallery).replace(/"/g,'&quot;')},0)">
        <img src="${e.img}" alt="${e.name}" loading="lazy" data-main-img>
        <span class="p-badge">Experience</span>
        <span class="p-price-tag">${loc(e.price)}</span>
      </div>
      <div class="p-body">
        ${thumbs}
        <div class="p-top"><h3>${e.name}</h3></div>
        <div class="p-loc">${e.loc}</div>
        <div class="p-desc">${loc(e.desc)}</div>
        <div class="p-tags">${e.tags.map(tg=>`<span class="p-tag">${tg}</span>`).join('')}</div>
        <div class="p-actions">
          <a class="p-wa" href="${waLink(e.name)}" target="_blank" rel="noopener">${waSvg} ${t('book_wa')}</a>
        </div>
      </div>
    </article>`;
  }).join('');

  // Final WA links
  document.getElementById('finalWA').href=waLink('Custom Plan');
  document.getElementById('faqWA')&&(document.getElementById('faqWA').href=waLink('Question'));
}

/* ===== RENDER: FAQS ===== */
function renderFaqs(){
  const el=document.getElementById('faqSection');
  el.innerHTML=faqs.map(cat=>`
    <div class="faq-cat">${loc(cat.cat)}</div>
    ${cat.items.map(item=>`
      <div class="faq-item">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
          <span>${loc(item.q)}</span><span class="arrow">▾</span>
        </div>
        <div class="faq-a"><p>${loc(item.a)}</p></div>
      </div>`).join('')}`).join('');
  document.getElementById('faqWA').href=waLink('Question');
}

/* ===== JET SKI MODAL ===== */
function renderJsTours(){
  document.getElementById('jsTourList').innerHTML=jetSkiTours.map(tr=>`
    <div class="jf-tour${tr.id===selTour?' sel':''}" data-tour="${tr.id}" onclick="selTour='${tr.id}';renderJsTours()">
      <div class="jf-radio"></div>
      <div class="jf-tinfo"><div class="jf-tname">${tr.name}</div><div class="jf-tmeta">${tr.dur}</div></div>
      <div class="jf-tprice">${tr.price} €</div>
    </div>`).join('');
}

function openJetSki(){
  renderJsTours();
  const di=document.getElementById('jsDate');di.min=new Date().toISOString().split('T')[0];
  document.getElementById('jsModal').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow='';
}

document.addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))closeModal(e.target.id)});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-bg.show').forEach(m=>closeModal(m.id))});

document.getElementById('jsSendBtn').addEventListener('click',()=>{
  const n=document.getElementById('jsName').value.trim();
  const ph=document.getElementById('jsPhone').value.trim();
  const p=document.getElementById('jsPax').value;
  const s=document.getElementById('jsSkis').value;
  const pu=document.getElementById('jsPickup').value.trim();
  const d=document.getElementById('jsDate').value;
  const tm=document.getElementById('jsTime').value;
  const no=document.getElementById('jsNotes').value.trim();
  if(!n||!ph||!d||!tm){toast('Please complete all fields');return}
  const tour=jetSkiTours.find(x=>x.id===selTour);
  const msg=`Hi! Jet Ski Tour: ${tour.name}\nName: ${n}\nPhone: ${ph}\nDate: ${d} ${tm}\nPax: ${p} / Jet Skis: ${s}\nPickup: ${pu}${no?'\nNotes: '+no:''}`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
  toast('Opening WhatsApp…',true);
  closeModal('jsModal');
});

/* ===== LANG ===== */
function renderLangs(){
  document.getElementById('langGrp').innerHTML=LANGS.map(l=>`<button class="lb${l===lang?' on':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join('');
}

function setLang(l){
  lang=l;
  localStorage.setItem('ml_lang',l);
  applyI18n();
  renderLangs();
  renderHome();
  renderBookPage();
  renderFaqs();
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.dataset.i18n;
    const val=t(k);
    if(val)el.innerHTML=val;
  });
}

/* ===== LIGHTBOX ===== */
function openLightbox(images,idx){
  lbImages=images;lbIdx=idx||0;
  const lb=document.getElementById('lightbox');
  const img=document.getElementById('lbImg');
  const cnt=document.getElementById('lbCounter');
  img.src=lbImages[lbIdx].replace('/upload/','/upload/w_1200,q_auto,f_auto/');
  cnt.textContent=(lbIdx+1)+' / '+lbImages.length;
  lb.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeLightbox(e){
  if(e&&e.target!==document.getElementById('lightbox')&&!e.target.classList.contains('lightbox-close'))return;
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow='';
}
function lbNav(dir,e){
  e&&e.stopPropagation();
  lbIdx=(lbIdx+dir+lbImages.length)%lbImages.length;
  document.getElementById('lbImg').src=lbImages[lbIdx].replace('/upload/','/upload/w_1200,q_auto,f_auto/');
  document.getElementById('lbCounter').textContent=(lbIdx+1)+' / '+lbImages.length;
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('show'))return;
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='Escape')closeLightbox({target:document.getElementById('lightbox')});
});

/* Card image swap (gallery thumbnails) */
function swapCardImg(thumbEl,newSrc){
  const card=thumbEl.closest('.p-card');
  const mainImg=card.querySelector('[data-main-img]');
  if(mainImg)mainImg.src=newSrc;
  card.querySelectorAll('.p-gallery-thumb').forEach(t=>t.classList.remove('active'));
  thumbEl.classList.add('active');
}

/* ===== REVEAL ===== */
function initReveals(){
  if(!('IntersectionObserver' in window))return;
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}});
  },{threshold:0.06,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv:not(.vis)').forEach(el=>io.observe(el));
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('ml_lang');
  if(saved&&LANGS.includes(saved))lang=saved;
  else{const br=(navigator.language||'en').slice(0,2);if(LANGS.includes(br))lang=br}
  applyI18n();
  renderLangs();
  renderHome();
  renderBookPage();
  renderFaqs();
  initReveals();
  // Handle hash routing
  const hash=window.location.hash.replace('#','');
  if(['book','faqs'].includes(hash))nav(hash);
});
</script>
