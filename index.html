<style>
:root{--bg:#050505;--bg2:#111;--bg3:#191919;--card:#0e0e0e;--card2:#141414;--line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.09);--line3:rgba(255,255,255,.14);--text:#eee;--text2:rgba(255,255,255,.48);--text3:rgba(255,255,255,.24);--gold:#c9a96e;--gold2:#d9bc82;--golddim:rgba(201,169,110,.12);--goldglow:rgba(201,169,110,.28);--wa:#25d366;--danger:#ef4444;--success:#10b981;--ff:'DM Sans',sans-serif;--fs:'Playfair Display',serif;--ease:.25s cubic-bezier(.4,0,.2,1);--ease2:.4s cubic-bezier(.22,1,.36,1);--r:12px;--r2:16px;--r3:24px;--rmax:999px;--btn-text:#0a0a0a;--shadow-sm:0 2px 8px rgba(0,0,0,.2);--shadow-md:0 10px 32px rgba(0,0,0,.3);--shadow-lg:0 20px 60px rgba(0,0,0,.4);--safe-bottom:env(safe-area-inset-bottom,0px)}

body.lm::before{opacity:.08}body.lm .topbar{background:rgba(247,246,242,.94)}body.lm .hero-bg img{opacity:.55;filter:saturate(.85) brightness(1.05)}body.lm .hero-bg::after{background:linear-gradient(to top,var(--bg) 0%,rgba(247,246,242,.5) 35%,rgba(247,246,242,.15) 65%,rgba(247,246,242,.4) 100%)}body.lm .cat-nav{background:rgba(247,246,242,.95)}body.lm .cat-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}body.lm .btn-gold,body.lm .v-wa,body.lm .f-submit,body.lm .jf-submit,body.lm .ib-submit,body.lm .ib-next,body.lm .cart-dock-btn{color:#fff}body.lm .v-card{box-shadow:0 1px 4px rgba(0,0,0,.05)}body.lm .p-logo{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}body.lm .p-logo img{filter:none}body.lm .feat-info h3,body.lm .feat-info .feat-loc,body.lm .feat-tag,body.lm .feat-price,body.lm .col-info h3,body.lm .col-info p,body.lm .col-eyebrow,body.lm .col-cta,body.lm .v-img-overlay p,body.lm .v-img-overlay strong{color:#fff}body.lm .feat-tag{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.25)}

.topbar{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;background:rgba(5,5,5,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(14px,4vw,32px);transition:background var(--ease)}.tb-logo{font-family:var(--fs);font-size:18px;font-weight:600;letter-spacing:-.02em;white-space:nowrap}.tb-logo span{color:var(--gold);font-style:italic}.tb-r{display:flex;align-items:center;gap:4px}.lang-grp{display:flex;gap:2px;flex-wrap:nowrap}.lb{padding:4px 7px;border-radius:6px;font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);transition:all var(--ease);min-width:26px}.lb:hover{color:var(--text2);background:var(--line)}.lb.on{color:var(--gold);background:var(--golddim)}.tb-icon{width:32px;height:32px;border-radius:8px;margin-left:2px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;transition:all var(--ease);position:relative}.tb-icon:hover{color:var(--text);background:var(--line)}.tb-icon svg{width:15px;height:15px;fill:currentColor}.tb-icon .badge{position:absolute;top:2px;right:2px;min-width:14px;height:14px;border-radius:7px;background:var(--gold);color:var(--btn-text);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}@media(max-width:520px){.lb{padding:3px 5px;font-size:9px;min-width:22px}}

);background:rgba(255,255,255,.03);color:var(--text);font-weight:600;font-size:13px;border:1px solid var(--line2);transition:all var(--ease);white-space:nowrap;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.btn-ghost:hover{border-color:var(--line3);background:rgba(255,255,255,.06);transform:translateY(-1px)}
.hero-scroll{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:6px;animation:bob 2s ease-in-out infinite;pointer-events:none}@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}.hero-scroll::after{content:'';width:1px;height:20px;background:linear-gradient(to bottom,var(--text3),transparent)}
.trust{display:flex;justify-content:center;gap:clamp(20px,5vw,60px);padding:28px clamp(16px,4vw,40px);border-bottom:1px solid var(--line);background:linear-gradient(to bottom,transparent,rgba(255,255,255,.01))}.trust-item{text-align:center}.trust-item strong{display:block;font-family:var(--fs);font-size:clamp(24px,3vw,36px);font-weight:500;letter-spacing:-.02em;color:var(--gold);line-height:1}.trust-item span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-top:6px;display:block}
.sec-title{max-width:1200px;margin:0 auto;padding:clamp(40px,5vh,72px) clamp(16px,4vw,40px) 22px}.sec-title h2{font-family:var(--fs);font-size:clamp(26px,3.2vw,42px);font-weight:500;letter-spacing:-.02em;line-height:1.1}.sec-title h2 em{font-style:italic;color:var(--gold)}.sec-title p{font-size:13.5px;color:var(--text2);margin-top:8px;max-width:460px;line-height:1.55}
.featured{padding:0 0 16px}.feat-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:0 clamp(16px,4vw,40px) 16px;scroll-snap-type:x mandatory;scroll-padding-left:clamp(16px,4vw,40px)}.feat-scroll::-webkit-scrollbar{display:none}.feat-card{flex:0 0 clamp(240px,32vw,320px);scroll-snap-align:start;border-radius:var(--r2);overflow:hidden;position:relative;aspect-ratio:3/4;cursor:pointer;display:block}.feat-card img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease2)}.feat-card:hover img{transform:scale(1.06)}.feat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 50%,rgba(0,0,0,.05) 100%);pointer-events:none}.feat-info{position:absolute;bottom:0;left:0;right:0;z-index:1;padding:18px}.feat-tag{display:inline-block;padding:4px 10px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(201,169,110,.2);color:var(--gold);border:1px solid rgba(201,169,110,.28);margin-bottom:8px;backdrop-filter:blur(8px)}.feat-info h3{font-family:var(--fs);font-size:20px;font-weight:500;margin-bottom:4px;color:#fff;letter-spacing:-.01em}.feat-info .feat-loc{font-size:11px;color:rgba(255,255,255,.68);letter-spacing:.04em;font-weight:500}.feat-price{position:absolute;top:12px;right:12px;z-index:1;padding:5px 11px;border-radius:var(--rmax);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);font-size:11.5px;font-weight:700;color:var(--gold)}
.cat-nav{position:sticky;top:56px;z-index:800;background:rgba(5,5,5,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--line);padding:10px clamp(16px,4vw,40px);transition:background var(--ease)}.cat-inner{display:flex;gap:6px;max-width:1200px;margin:0 auto;overflow-x:auto;scrollbar-width:none;align-items:center}.cat-inner::-webkit-scrollbar{display:none}.cat-btn{padding:8px 15px;border-radius:var(--rmax);font-size:11.5px;font-weight:600;white-space:nowrap;color:var(--text2);border:1px solid transparent;transition:all var(--ease);display:inline-flex;align-items:center;gap:5px}.cat-btn:hover{color:var(--text);background:var(--line)}.cat-btn.on{color:var(--btn-text);background:var(--gold);border-color:var(--gold)}.cat-btn .cat-count{font-size:9.5px;opacity:.65;font-weight:500}
.search-bar{max-width:1200px;margin:12px auto 0;padding:0 clamp(16px,4vw,40px);display:none}.search-bar.show{display:block}.search-input-wrap{position:relative;display:flex;align-items:center}.search-input{width:100%;padding:11px 40px 11px 40px;border-radius:var(--r);background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--text);font-family:var(--ff);font-size:13.5px;outline:none;transition:all var(--ease)}.search-input:focus{border-color:var(--gold);background:rgba(255,255,255,.07)}.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}.search-icon svg{width:15px;height:15px;fill:currentColor}.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--line);display:none;align-items:center;justify-content:center;color:var(--text2);font-size:12px;cursor:pointer}.search-clear.show{display:flex}.search-clear:hover{background:var(--line3);color:var(--text)}
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 48px}.grid-meta{display:flex;justify-content:space-between;align-items:center;padding:14px 0 14px;font-size:12px;color:var(--text2);flex-wrap:wrap;gap:8px}.grid-count em{color:var(--gold);font-style:normal;font-weight:700}.grid-sort{display:flex;gap:4px;font-size:11px}.sort-btn{padding:5px 11px;border-radius:var(--rmax);color:var(--text2);transition:all var(--ease);font-weight:500;cursor:pointer}.sort-btn.on{color:var(--gold);background:var(--golddim)}.sort-btn:hover{color:var(--text)}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}@media(max-width:640px){.venue-grid{grid-template-columns:1fr 1fr;gap:8px}}@media(max-width:400px){.venue-grid{grid-template-columns:1fr}}
.v-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:all var(--ease);position:relative;display:flex;flex-direction:column}.v-card:hover{border-color:var(--line3);transform:translateY(-3px);box-shadow:var(--shadow-md)}.v-img{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--bg2)}.v-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease2)}.v-card:hover .v-img img{transform:scale(1.05)}.v-img-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.72) 45%,rgba(0,0,0,.35) 100%);opacity:0;transition:opacity .35s var(--ease2);display:flex;align-items:flex-end;padding:14px;pointer-events:none}.v-card:hover .v-img-overlay,.v-card:focus-within .v-img-overlay{opacity:1}.v-img-overlay div{width:100%}.v-img-overlay strong{color:var(--gold);font-weight:700;display:block;margin-bottom:6px;font-size:10px;text-transform:uppercase;letter-spacing:.1em}.v-img-overlay p{font-size:12px;color:rgba(255,255,255,.92);line-height:1.55;font-weight:400}
.v-badge{position:absolute;top:8px;left:8px;padding:3.5px 9px;border-radius:var(--rmax);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(8px);z-index:3}.b-open{background:rgba(201,169,110,.2);color:var(--gold);border:1px solid rgba(201,169,110,.3)}.b-season{background:rgba(255,255,255,.1);color:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.12)}.b-premium{background:rgba(201,169,110,.35);color:#fff;border:1px solid rgba(201,169,110,.45);animation:premPulse 3s ease-in-out infinite}
@keyframes premPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,0)}50%{box-shadow:0 0 0 4px rgba(201,169,110,.15)}}
.v-fav{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--ease);z-index:4;color:rgba(255,255,255,.75)}.v-fav:hover{background:rgba(0,0,0,.6);transform:scale(1.1)}.v-fav.on{color:#ff5c7a;background:rgba(255,92,122,.15);border-color:rgba(255,92,122,.3)}.v-fav svg{width:14px;height:14px;fill:currentColor;transition:transform var(--ease)}.v-fav.on svg{transform:scale(1.15)}
.v-body{padding:11px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1}.v-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}.v-top h3{font-size:13px;font-weight:700;letter-spacing:-.01em;flex:1;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}.v-pr{font-size:10.5px;font-weight:700;color:var(--gold);white-space:nowrap;padding-top:1px}.v-loc{font-size:10px;color:var(--text3);letter-spacing:.03em;font-weight:500;display:flex;align-items:center;gap:3px}.v-loc::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--text3)}.v-tags{display:flex;flex-wrap:wrap;gap:3px}.v-tag{font-size:9px;color:var(--text2);padding:2.5px 6px;border-radius:var(--rmax);background:rgba(255,255,255,.04);border:1px solid var(--line);letter-spacing:.02em}.v-tag.info{background:rgba(201,169,110,.08);color:var(--gold);border-color:rgba(201,169,110,.2);font-weight:600}
.v-acts{display:flex;gap:5px;margin-top:auto;padding-top:6px}.v-wa,.v-add{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:9px;font-size:11px;font-weight:700;transition:all var(--ease);letter-spacing:.02em;border:none;cursor:pointer;font-family:var(--ff)}.v-wa{flex:1;background:var(--gold);color:var(--btn-text)}.v-wa:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 14px var(--goldglow)}.v-wa svg{width:12px;height:12px;fill:currentColor}.v-add{flex:1;background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line2)}.v-add:hover{background:rgba(255,255,255,.08);border-color:var(--line3)}.v-add.added{background:var(--golddim);color:var(--gold);border-color:rgba(201,169,110,.35)}.v-add svg{width:13px;height:13px;fill:currentColor}
.v-map{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--ease);flex-shrink:0;color:var(--text2)}.v-map:hover{background:rgba(255,255,255,.08);color:var(--text)}
.v-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text2)}.v-empty h4{font-family:var(--fs);font-size:22px;color:var(--text);margin-bottom:8px;font-weight:500}.v-empty p{font-size:13px;margin-bottom:16px}.v-empty button{padding:10px 22px;border-radius:var(--rmax);background:var(--golddim);color:var(--gold);font-weight:600;font-size:12px;border:1px solid rgba(201,169,110,.3);cursor:pointer;font-family:var(--ff)}

/* PROMPT 7: Session memory */
const SESSION={clicks:[],lastCats:[],viewStart:Date.now()};
function trackClick(id){const v=V.find(x=>x.id===id);if(!v)return;SESSION.clicks.push(id);if(!SESSION.lastCats.includes(v.cat))SESSION.lastCats.push(v.cat)}
/* Enhanced WhatsApp link with context */
function waLinkSmart(v){const tp=getTimePeriod();const timeHint=tp==='morning'?' (today)':tp==='afternoon'?' (this evening)':'';const msg={es:`Hola! Me interesa ${loc(v.name)} (${loc(v.loc)})${timeHint}. ¿Disponibilidad?`,en:`Hi! Interested in ${loc(v.name)} (${loc(v.loc)})${timeHint}. Availability?`,de:`Hallo! Interesse an ${loc(v.name)} (${loc(v.loc)})${timeHint}. Verfügbar?`,fr:`Bonjour! Intéressé par ${loc(v.name)} (${loc(v.loc)})${timeHint}. Disponible?`,it:`Ciao! Interessato a ${loc(v.name)} (${loc(v.loc)})${timeHint}. Disponibile?`,ar:`مرحبا! أريد ${loc(v.name)} (${loc(v.loc)})${timeHint}. متاح؟`,ru:`Привет! Интересует ${loc(v.name)} (${loc(v.loc)})${timeHint}. Есть места?`};return`https://wa.me/${WA}?text=${encodeURIComponent(msg[lang]||msg.en)}`}

/* RENDERS */
function renderLangBtns(){document.getElementById('langGrp').innerHTML=LANGS.map(l=>`<button class="lb${l===lang?' on':''}" data-lang="${l}">${l.toUpperCase()}</button>`).join('');document.querySelectorAll('#langGrp .lb').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)))}
function renderCatBtns(){const cats=['all','water','beach','mountain','night','culture','food','free'];const counts={all:V.length};cats.forEach(c=>{if(c!=='all')counts[c]=V.filter(v=>v.cat===c).length});document.getElementById('catInner').innerHTML=cats.filter(c=>c==='all'||counts[c]>0).map(c=>`<button class="cat-btn${c===cat?' on':''}" data-cat="${c}">${t('c_'+c)} <span class="cat-count">${counts[c]||''}</span></button>`).join('');document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>setCat(b.dataset.cat)));document.querySelectorAll('.sort-btn').forEach(b=>{b.classList.toggle('on',b.dataset.sort===sort);b.onclick=()=>{sort=b.dataset.sort;renderVenues();document.querySelectorAll('.sort-btn').forEach(x=>x.classList.toggle('on',x.dataset.sort===sort))}})}
function renderFeatured(){document.getElementById('featScroll').innerHTML=V.filter(v=>v.feat).map(v=>{let href,tgt='';if(v.jetski)href='javascript:void(0)';else if(v.bcm){href=BCM_TICKET_URL;tgt=' target="_blank"'}else if(v.bp){href=BOAT_PARTY_URL;tgt=' target="_blank"'}else if(!v.paid)href='#plans';else{href=waLink(v);tgt=' target="_blank"'}return`<a class="feat-card" href="${href}"${tgt} ${v.jetski?'onclick="openJetSki()"':''}><img src="${v.img}" alt="${esc(loc(v.name))}" loading="lazy"><span class="feat-price">${esc(loc(v.price))}</span><div class="feat-info"><span class="feat-tag">${esc(loc(v.bTxt))}</span><h3>${esc(loc(v.name))}</h3><div class="feat-loc">${esc(loc(v.loc))}</div></div></a>`}).join('')}

function renderVenues(){const g=document.getElementById('vGrid');let list=V.slice();if(showFavsOnly)list=list.filter(v=>favs.includes(v.id));else if(cat!=='all')list=list.filter(v=>v.cat===cat);if(query){const q=query.toLowerCase();list=list.filter(v=>[loc(v.name),loc(v.loc),loc(v.desc),...(loc(v.tags)||[])].join(' ').toLowerCase().includes(q))}if(sort==='price-asc')list.sort((a,b)=>(a._pr||0)-(b._pr||0));else if(sort==='price-desc')list.sort((a,b)=>(b._pr||0)-(a._pr||0));else list.sort((a,b)=>getSmartScore(b)-getSmartScore(a));document.getElementById('gridCount').textContent=list.length;if(!list.length){g.innerHTML=`<div class="v-empty"><h4>${t('grid_empty_t')}</h4><p>${t('grid_empty_s')}</p><button onclick="resetFilters()">${t('grid_empty_btn')}</button></div>`;return}
g.innerHTML=list.map(v=>{const bc=v.badge==='premium'?'b-premium':v.badge==='season'?'b-season':'b-open';const isFav=favs.includes(v.id),inCart=cart.includes(v.id);const scarcity=getScarcitySignal(v);const micro=v.paid?getMicroTrigger(v):'';const signalTag=scarcity?`<span class="v-tag info">${esc(scarcity)}</span>`:'';const microTag=micro?`<span class="v-tag">${esc(micro)}</span>`:'';const tags=(loc(v.tags)||[]).map(tg=>`<span class="v-tag">${esc(tg)}</span>`).join('')+signalTag+microTag+(!v.paid?`<span class="v-tag info">${t('info_tag')}</span>`:'');
const gal=v.gallery&&v.gallery.length>1?`<div class="v-gallery">${v.gallery.map((gi,gx)=>`<div class="v-gth${gx===0?' on':''}" onclick="gSwap(this,'${gi.replace(/'/g,"\\'")}')"><img src="${toThumb(gi)}" alt="" loading="lazy"></div>`).join('')}</div>`:'';
let acts='';if(v.jetski)acts=`<button class="v-wa" onclick="trackClick('${v.id}');openJetSki()">${t('book')}</button>`;else if(v.bcm)acts=`<a class="v-wa" href="${BCM_TICKET_URL}" target="_blank" onclick="trackClick('${v.id}')">${t('buy_ticket')}</a>`;else if(v.bp)acts=`<a class="v-wa" href="${BOAT_PARTY_URL}" target="_blank" onclick="trackClick('${v.id}')">${t('buy_ticket')}</a>`;else if(v.paid)acts=`<a class="v-wa" href="${waLinkSmart(v)}" target="_blank" onclick="trackClick('${v.id}')">${t('book')}</a>`;
const addBtn=`<button class="v-add ${inCart?'added':''}" onclick="toggleCart('${v.id}',event)"><svg viewBox="0 0 24 24">${inCart?'<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>':'<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/>'}</svg>${t(inCart?'added':'add')}</button>`;
const mapBtn=v.map?`<a class="v-map" href="${v.map}" target="_blank">📍</a>`:'';
const lbClick=v.gallery&&v.gallery.length?` onclick="lbOpen([${v.gallery.map(g=>"'"+g.replace(/'/g,"\\'")+"'").join(',')}],0)" style="cursor:zoom-in"`:'';
return`<article class="v-card rv"><div class="v-img"${lbClick}><img src="${v.img}" alt="${esc(loc(v.name))}" loading="lazy"><span class="v-badge ${bc}">${esc(loc(v.bTxt))}</span><button class="v-fav ${isFav?'on':''}" onclick="toggleFav('${v.id}',event)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button><div class="v-img-overlay"><div><strong>${esc(loc(v.loc))}</strong><p>${esc(loc(v.desc))}</p></div></div></div><div class="v-body">${gal}<div class="v-top"><h3>${esc(loc(v.name))}</h3><span class="v-pr">${esc(loc(v.price))}</span></div><div class="v-loc">${esc(loc(v.loc))}</div><div class="v-tags">${tags}</div><div class="v-acts">${acts}${addBtn}${mapBtn}</div></div></article>`}).join('');
requestAnimationFrame(()=>{g.querySelectorAll('.rv').forEach((c,i)=>setTimeout(()=>c.classList.add('vis'),i*25))})}

function renderVisualGallery(){const el=document.getElementById('vgGrid');if(!el)return;el.innerHTML=galleryPool.map((img,i)=>`<img src="${img.replace('/upload/','/upload/w_600,h_600,c_fill,q_auto,f_auto/')}" alt="Mallorca" loading="lazy" onclick="lbOpen(galleryPool,${i})">`).join('')}
function renderCollections(){document.getElementById('colGrid').innerHTML=collections.map(c=>`<a class="collection-card rv" href="#plans" onclick="setCat('${c.target}')"><img src="${c.img}" alt="${esc(loc(c.name))}" loading="lazy"><div class="col-overlay"></div><div class="col-info"><div class="col-eyebrow">${esc(loc(c.eyebrow))}</div><h3>${esc(loc(c.name))}</h3><p>${esc(loc(c.desc))}</p><div class="col-cta">Explore →</div></div></a>`).join('')}
function renderPricing(){document.getElementById('pricingGrid').innerHTML=pricingData.map(p=>`<div class="p-card rv"><h4>${esc(loc(p.title))}</h4><div class="p-sub">${esc(loc(p.sub))}</div>${p.rows.map(r=>`<div class="p-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')}<div class="p-note">${esc(loc(p.note))}</div></div>`).join('')}
function renderPartners(){document.getElementById('partnerRow').innerHTML=partners.map(p=>`<div class="p-logo"><img src="${p.img}" alt="${p.n}" loading="lazy"></div>`).join('')}

function setCat(c){cat=c;showFavsOnly=false;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===c));renderVenues();setTimeout(()=>document.getElementById('plans').scrollIntoView({behavior:'smooth',block:'start'}),50)}
function resetFilters(){cat='all';query='';showFavsOnly=false;document.getElementById('searchInput').value='';renderCatBtns();renderVenues()}
function toggleFav(id,e){e&&e.stopPropagation();e&&e.preventDefault();const i=favs.indexOf(id);if(i>=0){favs.splice(i,1);toast(t('toast_fav_off'))}else{favs.push(id);toast(t('toast_fav_on'),'success')};STORE.set('favs',favs);updateFavBadge();renderVenues()}
function updateFavBadge(){const b=document.getElementById('favBadge');if(favs.length){b.textContent=favs.length;b.style.display='flex'}else b.style.display='none'}
function toggleCart(id,e){e&&e.stopPropagation();e&&e.preventDefault();const i=cart.indexOf(id);if(i>=0){cart.splice(i,1);toast(t('toast_removed'))}else{cart.push(id);toast(t('toast_added'),'success')};STORE.set('cart',cart);renderCartDock();renderVenues()}
function renderCartDock(){const d=document.getElementById('cartDock'),c=cart.length;document.getElementById('cartCount').textContent=c;if(c>0){const total=cart.map(id=>V.find(v=>v.id===id)).filter(Boolean).reduce((s,v)=>s+(v._pr||0),0);document.getElementById('cartTotalDock').textContent=total>0?total+' €':'TBC';d.classList.add('show')}else d.classList.remove('show')}
let searchDebounce;
function initSearch(){const input=document.getElementById('searchInput'),clear=document.getElementById('searchClear'),btn=document.getElementById('searchBtn'),bar=document.getElementById('searchBar');input.placeholder=t('search_ph');btn.addEventListener('click',()=>{bar.classList.toggle('show');if(bar.classList.contains('show'))setTimeout(()=>input.focus(),100)});input.addEventListener('input',e=>{clear.classList.toggle('show',e.target.value.length>0);clearTimeout(searchDebounce);searchDebounce=setTimeout(()=>{query=e.target.value;renderVenues()},180)});clear.addEventListener('click',()=>{input.value='';query='';clear.classList.remove('show');renderVenues()})}
function initFavToggle(){document.getElementById('favBtn').addEventListener('click',()=>{showFavsOnly=!showFavsOnly;document.getElementById('favBtn').classList.toggle('on',showFavsOnly);if(showFavsOnly)toast(t('favs_only'));renderVenues()})}
function initTheme(){if(STORE.get('theme')==='lm')document.body.classList.add('lm');document.getElementById('themeBtn').addEventListener('click',()=>{document.body.classList.toggle('lm');STORE.set('theme',document.body.classList.contains('lm')?'lm':'dm')})}
function setLang(l){lang=l;STORE.set('lang',l);document.documentElement.lang=l;document.documentElement.dir=RTL.includes(l)?'rtl':'ltr';applyI18n();renderLangBtns();renderCatBtns();renderFeatured();renderVenues();renderCollections();renderVisualGallery();renderPricing();populateActivitySelect();renderJetSkiTours()}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n);if(v)el.innerHTML=v});const s=document.getElementById('searchInput');if(s)s.placeholder=t('search_ph')}
function openModal(id){document.getElementById(id).classList.add('show');document.body.style.overflow='hidden'}
function closeModal(id){document.getElementById(id).classList.remove('show');document.body.style.overflow=''}
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('modal-bg'))closeModal(e.target.id)});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-bg.show').forEach(m=>closeModal(m.id));if(document.getElementById('lbBg').classList.contains('show'))lbClose()}if(document.getElementById('lbBg').classList.contains('show')){if(e.key==='ArrowLeft')lbGo(-1);if(e.key==='ArrowRight')lbGo(1)}});
function populateActivitySelect(){document.getElementById('fA').innerHTML=V.filter(v=>v.paid).map(v=>`<option value="${v.id}">${loc(v.name)} — ${loc(v.loc)}</option>`).join('')}
function openBooking(vid){populateActivitySelect();if(vid)document.getElementById('fA').value=vid;document.getElementById('fD').min=new Date().toISOString().split('T')[0];openModal('bkModal')}
function submitBooking(e){e.preventDefault();const n=document.getElementById('fN').value.trim(),vid=document.getElementById('fA').value,d=document.getElementById('fD').value,p=document.getElementById('fP').value,no=document.getElementById('fNo').value.trim(),v=V.find(x=>x.id===vid);if(!v)return;window.open(`https://wa.me/${WA}?text=${encodeURIComponent('Hi! '+n+'. Book '+loc(v.name)+' on '+fmtDate(d)+' for '+p+' pax.'+(no?' Notes: '+no:''))}`,'_blank');toast(t('toast_open'),'success');closeModal('bkModal')}
function renderJetSkiTours(){const el=document.getElementById('jsTours');if(!el)return;el.innerHTML=jetSkiTours.map(tr=>`<div class="jf-tour${tr.id===selTour?' sel':''}" data-tour="${tr.id}"><div class="jf-radio"></div><div class="jf-tinfo"><div class="jf-tname">${tr.name}</div><div class="jf-tmeta">${tr.dur}</div></div><div class="jf-tprice">${tr.price} €</div></div>`).join('');el.querySelectorAll('.jf-tour').forEach(n=>n.addEventListener('click',()=>{selTour=n.dataset.tour;renderJetSkiTours()}))}
function openJetSki(){document.getElementById('jsDate').min=new Date().toISOString().split('T')[0];renderJetSkiTours();openModal('jsModal')}
document.getElementById('jsSend').addEventListener('click',()=>{const n=document.getElementById('jsName').value.trim(),ph=document.getElementById('jsPhone').value.trim(),p=document.getElementById('jsPax').value,s=document.getElementById('jsSkis').value,pu=document.getElementById('jsPickup').value.trim(),d=document.getElementById('jsDate').value,tm=document.getElementById('jsTime').value,no=document.getElementById('jsNotes').value.trim();if(!n||!ph||!d||!tm){toast('Complete all fields','err');return}const tour=jetSkiTours.find(x=>x.id===selTour);window.open(`https://wa.me/${WA}?text=${encodeURIComponent('Jet Ski: '+tour.name+'\nName: '+n+'\nPhone: '+ph+'\nDate: '+fmtDate(d)+' '+tm+'\nPax: '+p+' / Skis: '+s+'\nPickup: '+pu+(no?'\nNotes: '+no:''))}`,'_blank');toast(t('toast_open'),'success');closeModal('jsModal')});
function initReveals(){if(!('IntersectionObserver' in window))return;const io=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}})},{threshold:.06,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('.rv').forEach(el=>io.observe(el));new MutationObserver(ms=>{ms.forEach(m=>m.addedNodes.forEach(n=>{if(n.nodeType===1){if(n.classList&&n.classList.contains('rv'))io.observe(n);n.querySelectorAll&&n.querySelectorAll('.rv').forEach(el=>io.observe(el))}}))}).observe(document.body,{childList:true,subtree:true})}
document.addEventListener('DOMContentLoaded',()=>{favs=STORE.get('favs')||[];cart=STORE.get('cart')||[];const saved=STORE.get('lang');if(saved&&LANGS.includes(saved))lang=saved;else{const br=(navigator.language||'en').slice(0,2).toLowerCase();if(LANGS.includes(br))lang=br}document.documentElement.lang=lang;document.documentElement.dir=RTL.includes(lang)?'rtl':'ltr';initTheme();initSearch();initFavToggle();applyI18n();renderLangBtns();renderCatBtns();renderFeatured();renderVenues();renderVisualGallery();renderCollections();renderPricing();renderPartners();populateActivitySelect();renderJetSkiTours();updateFavBadge();renderCartDock();initReveals()});
</script>
</script>
</body>
